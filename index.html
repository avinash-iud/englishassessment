  },

  prettifyCompetency(key) {
    const map = { tense: 'Tense Usage', agreement: 'Subject-Verb Agreement', voice: 'Active/Passive Voice', modal: 'Modals & Auxiliaries', preposition: 'Prepositions', relative: 'Relative Clauses', conditional: 'Conditionals', inversion: 'Inversion', comparative: 'Comparatives & Superlatives', conjunction: 'Conjunctions & Linkers', determiner: 'Articles & Determiners', subjunctive: 'Subjunctive Mood', verbal: 'Gerunds & Infinitives', synonym: 'Synonyms', antonym: 'Antonyms', phrasal: 'Phrasal Verbs', 'word-form': 'Word Form', 'word-fit': 'Contextual Word Use' };
    return map[key] || key;
  },

  writingPage(sess, sc) {
    const a = sess.answers;
    const q = sess.questions;
    const w1 = sc.sections.writingTask1;
    const w2 = sc.sections.writingTask2;

    function criteriaTable(criteria) {
      if (!criteria || Object.keys(criteria).length === 0) return el('div', { class: 'pdf-body', style: { fontStyle: 'italic', color: '#6B6188' } }, 'No criterion-level breakdown available (heuristic scoring).');
      return el('table', { class: 'pdf-table' },
        el('thead', {}, el('tr', {}, el('th', {}, 'Criterion'), el('th', {}, 'Score'), el('th', {}, 'Feedback'))),
        el('tbody', {},
          ...Object.entries(criteria).map(([k, v]) => el('tr', {},
            el('td', {}, k.replace(/([A-Z])/g, ' $1').replace(/^./, c => c.toUpperCase())),
            el('td', { style: { fontWeight: 700 } }, String(v.score)),
            el('td', {}, v.feedback || '—')
          ))
        )
      );
    }

    return el('div', { class: 'pdf-page' },
      this.pageHeader(5, 8),
      el('h1', { class: 'pdf-h1' }, 'Vocabulary & Writing Insights'),
      el('h3', { class: 'pdf-h3' }, '9. Vocabulary Proficiency'),
      el('div', { class: 'pdf-body' },
        el('p', {}, `Vocabulary score: ${sc.sections.vocabulary.score} / 10 (${(sc.sections.vocabulary.score/10*100).toFixed(0)}% accuracy). `,
          sc.sections.vocabulary.score >= 7 ? 'The candidate demonstrates strong professional-level vocabulary including good handling of synonyms, antonyms and phrasal verbs.'
          : sc.sections.vocabulary.score >= 5 ? 'The candidate has functional vocabulary at the working level. Active expansion of professional-register vocabulary is recommended.'
          : 'The candidate has limited working vocabulary. Focused vocabulary development is a priority for any English-medium role.'
        )
      ),
      el('h3', { class: 'pdf-h3 mt-6' }, '10. Writing — Task 1: Email/Memo'),
      el('div', { class: 'pdf-body', style: { fontSize: '11px', marginBottom: '8px' } },
        el('strong', {}, 'Prompt: '), q.writingTask1.prompt,
        el('br'),
        el('strong', {}, 'Word count: '), `${w1.wordCount || countWords(a.writingTask1)} `,
        el('strong', { style: { marginLeft: '12px' } }, 'Score: '), `${w1.score} / 10`
      ),
      criteriaTable(w1.criteria),
      w1.summary ? el('div', { style: { background: '#F4F1FA', borderLeft: '3px solid #8B21C9', padding: '10px 14px', fontSize: '11.5px', lineHeight: '1.6', marginTop: '12px', borderRadius: '0 6px 6px 0' } }, el('strong', {}, 'Overall feedback: '), w1.summary) : null,
      el('h3', { class: 'pdf-h3 mt-6' }, '11. Writing — Task 2: Opinion Essay'),
      el('div', { class: 'pdf-body', style: { fontSize: '11px', marginBottom: '8px' } },
        el('strong', {}, 'Prompt: '), q.writingTask2.prompt,
        el('br'),
        el('strong', {}, 'Word count: '), `${w2.wordCount || countWords(a.writingTask2)} `,
        el('strong', { style: { marginLeft: '12px' } }, 'Score: '), `${w2.score} / 15`
      ),
      criteriaTable(w2.criteria),
      w2.summary ? el('div', { style: { background: '#F4F1FA', borderLeft: '3px solid #8B21C9', padding: '10px 14px', fontSize: '11.5px', lineHeight: '1.6', marginTop: '12px', borderRadius: '0 6px 6px 0' } }, el('strong', {}, 'Overall feedback: '), w2.summary) : null,
      this.pageFooter()
    );
  },

  logicalSummaryPage(sess, sc) {
    return el('div', { class: 'pdf-page' },
      this.pageHeader(6, 8),
      el('h1', { class: 'pdf-h1' }, 'Logical English & Communication Summary'),
      el('h3', { class: 'pdf-h3' }, '12. Logical English Insights'),
      el('div', { class: 'pdf-body' },
        el('p', {}, `Logical English score: ${sc.sectionTotals.logical} / 10 (${(sc.sectionTotals.logical/10*100).toFixed(0)}%).`),
        el('table', { class: 'pdf-table mt-3' },
          el('thead', {}, el('tr', {}, el('th', {}, 'Sub-section'), el('th', {}, 'Score'), el('th', {}, 'Interpretation'))),
          el('tbody', {},
            el('tr', {}, el('td', {}, 'Sentence Ordering'), el('td', {}, `${sc.sections.sentenceOrdering.score} / 5`),
              el('td', {}, sc.sections.sentenceOrdering.score >= 4 ? 'Strong discourse coherence' : sc.sections.sentenceOrdering.score >= 2 ? 'Moderate discourse coherence' : 'Weak discourse coherence')),
            el('tr', {}, el('td', {}, 'Paragraph Completion'), el('td', {}, `${sc.sections.paraCompletion.score} / 5`),
              el('td', {}, sc.sections.paraCompletion.score >= 4 ? 'Strong contextual reasoning' : sc.sections.paraCompletion.score >= 2 ? 'Moderate contextual reasoning' : 'Weak contextual reasoning'))
          )
        )
      ),
      el('h3', { class: 'pdf-h3 mt-6' }, '13. Communication Capability Summary'),
      el('div', { class: 'pdf-body' },
        el('p', {}, this.buildCommunicationNarrative(sc))
      ),
      this.pageFooter()
    );
  },

  buildCommunicationNarrative(sc) {
    const total = sc.total;
    const grammarPct = (sc.sectionTotals.grammarVocab / 35) * 100;
    const readingPct = (sc.sectionTotals.reading / 30) * 100;
    const writingPct = (sc.sectionTotals.writing / 25) * 100;
    const logicalPct = (sc.sectionTotals.logical / 10) * 100;

    let narrative = `The candidate scored ${total} out of 100 overall, placing them in the ${sc.proficiency.level} band. `;
    const strong = [];
    const weak = [];
    if (grammarPct >= 70) strong.push('grammar and vocabulary'); else if (grammarPct < 50) weak.push('grammatical accuracy and lexical range');
    if (readingPct >= 70) strong.push('reading comprehension'); else if (readingPct < 50) weak.push('reading comprehension of professional texts');
    if (writingPct >= 70) strong.push('written communication'); else if (writingPct < 50) weak.push('written expression and rubric-aligned structure');
    if (logicalPct >= 70) strong.push('logical discourse'); else if (logicalPct < 50) weak.push('logical structuring of arguments');

    if (strong.length) narrative += `Notable strengths include ${strong.join(', ')}. `;
    if (weak.length) narrative += `Development priorities include ${weak.join(', ')}. `;
    narrative += `For the role of ${State.candidate.position}, the candidate is ${sc.proficiency.indicator.toLowerCase()}. ${sc.proficiency.action}.`;
    return narrative;
  },

  hiringPage(c, sess, sc) {
    const violations = sess.violations.slice(0, 20); // cap display
    return el('div', { class: 'pdf-page' },
      this.pageHeader(7, 8),
      el('h1', { class: 'pdf-h1' }, 'Hiring Recommendation & Integrity Log'),
      el('h3', { class: 'pdf-h3' }, '14. Hiring Recommendation'),
      el('div', { style: { padding: '20px', background: sc.proficiency.color + '10', borderLeft: '4px solid ' + sc.proficiency.color, borderRadius: '0 8px 8px 0' } },
        el('div', { style: { fontSize: '22px', fontFamily: "'Playfair Display', serif", fontWeight: 700, color: sc.proficiency.color } }, sc.proficiency.indicator),
        el('div', { class: 'pdf-body mt-2', style: { color: '#2D2447' } }, sc.proficiency.action, '. ',
          'Recommended next step: ',
          sc.proficiency.level === 'Expert' || sc.proficiency.level === 'Advanced' ? 'Proceed to next round of interviews.'
          : sc.proficiency.level === 'Intermediate' ? 'Proceed with caution; consider a structured interview to validate the score and a development plan post-hire.'
          : 'Decline or route to a structured English upskilling programme before reconsideration.'
        )
      ),
      el('h3', { class: 'pdf-h3 mt-6' }, '15. Behavioural Observations'),
      el('table', { class: 'pdf-table' },
        el('tbody', {},
          el('tr', {}, el('th', { style: { width: '40%' } }, 'Total questions attempted'), el('td', {}, `${sc.sessionMeta.totalQuestionsAttempted} / 60+`)),
          el('tr', {}, el('th', {}, 'Time spent — Grammar & Vocab'), el('td', {}, fmtTime(sess.behaviour.perSectionDuration.grammar || 0))),
          el('tr', {}, el('th', {}, 'Time spent — Reading'), el('td', {}, fmtTime(sess.behaviour.perSectionDuration.reading || 0))),
          el('tr', {}, el('th', {}, 'Time spent — Writing'), el('td', {}, fmtTime(sess.behaviour.perSectionDuration.writing || 0))),
          el('tr', {}, el('th', {}, 'Time spent — Logical English'), el('td', {}, fmtTime(sess.behaviour.perSectionDuration.logical || 0))),
          el('tr', {}, el('th', {}, 'Section completion'), el('td', {}, sess.completedSections.map(s => `${s.section} (${s.reason})`).join(', ') || '—')),
        )
      ),
      el('h3', { class: 'pdf-h3 mt-6' }, '16. Anti-Cheat Violation Summary'),
      el('div', { style: { padding: '12px', background: sc.risk.color + '10', borderRadius: '8px', marginBottom: '12px', fontSize: '12px' } },
        el('strong', { style: { color: sc.risk.color } }, sc.risk.badge), ' — Risk Score: ',
        el('strong', {}, `${sc.risk.score}/100`), ' across ',
        el('strong', {}, `${sess.violations.length}`), ' logged event(s)'
      ),
      violations.length === 0
        ? el('div', { class: 'pdf-body' }, 'No integrity violations were detected during this session.')
        : el('table', { class: 'pdf-table' },
            el('thead', {}, el('tr', {}, el('th', {}, '#'), el('th', {}, 'Time'), el('th', {}, 'Event'), el('th', {}, 'Section'), el('th', {}, '+Pts'), el('th', {}, 'Total Risk'))),
            el('tbody', {},
              ...violations.map((v, i) => el('tr', {},
                el('td', {}, String(i + 1)),
                el('td', {}, new Date(v.t).toLocaleTimeString('en-IN')),
                el('td', {}, v.type.replace(/_/g, ' ')),
                el('td', {}, v.section || '—'),
                el('td', {}, `+${v.pts}`),
                el('td', {}, String(v.risk))
              ))
            )
          ),
      this.pageFooter()
    );
  },

  roadmapPage(sc) {
    const roadmap = this.buildRoadmap(sc);
    return el('div', { class: 'pdf-page' },
      this.pageHeader(8, 8),
      el('h1', { class: 'pdf-h1' }, 'Improvement Roadmap'),
      el('h3', { class: 'pdf-h3' }, '17. Prioritised Development Plan'),
      el('div', { class: 'pdf-body' },
        el('p', { style: { marginBottom: '14px' } }, `Below is a prioritised 3–6 month development plan tailored to the candidate's score profile. Each item is sequenced by impact-to-effort.`)
      ),
      el('table', { class: 'pdf-table' },
        el('thead', {}, el('tr', {},
          el('th', { style: { width: '5%' } }, '#'),
          el('th', { style: { width: '30%' } }, 'Focus Area'),
          el('th', { style: { width: '40%' } }, 'Recommended Action'),
          el('th', { style: { width: '12%' } }, 'Resource Type'),
          el('th', { style: { width: '13%' } }, 'Timeline'),
        )),
        el('tbody', {},
          ...roadmap.map((r, i) => el('tr', {},
            el('td', {}, String(i + 1)),
            el('td', {}, el('strong', {}, r.area)),
            el('td', {}, r.action),
            el('td', {}, r.resource),
            el('td', {}, r.timeline)
          ))
        )
      ),
      el('div', { style: { marginTop: '32px', padding: '14px 18px', background: '#F4F1FA', borderLeft: '3px solid #8B21C9', borderRadius: '0 8px 8px 0', fontSize: '11.5px', lineHeight: '1.65' } },
        el('strong', {}, 'A note on this assessment: '),
        'CEAP measures functional English proficiency relevant to typical workplace tasks. It is not a substitute for role-specific technical assessment, behavioural interviews, or reference checks. For decisions with high downstream impact, this report should be considered alongside other selection signals. AI-assisted evaluation is provided as a structured aid; final hiring decisions remain with the HR and hiring team.'
      ),
      el('div', { style: { marginTop: '40px', textAlign: 'center' } },
        el('div', { style: { fontFamily: "'Playfair Display', serif", fontSize: '14px', color: '#4F1B8C', fontWeight: 600 } }, 'End of Report'),
        el('div', { style: { fontSize: '10px', color: '#6B6188', marginTop: '4px' } }, `Channelplay English Assessment Platform · Report ID ${State.session.id}`)
      ),
      this.pageFooter()
    );
  },

  buildRoadmap(sc) {
    const roadmap = [];
    // Priority by weakness scores
    const items = [
      { pct: sc.sectionTotals.grammarVocab / 35, area: 'Grammar & Vocabulary', action: 'Daily 30-min grammar practice (focused on tense, agreement, articles) and active vocabulary journaling from quality professional reading.', resource: 'Practice book + app', timeline: '6-8 weeks' },
      { pct: sc.sectionTotals.reading / 30, area: 'Reading Comprehension', action: 'Read one long-form article from The Economist, Mint or Hindu BusinessLine daily; summarise the main argument in 3 sentences.', resource: 'Publication subscription', timeline: '4-6 weeks' },
      { pct: sc.sectionTotals.writing / 25, area: 'Written Communication', action: 'Weekly writing practice with structured feedback: 1 professional email and 1 short opinion paragraph; reviewed by a manager or mentor.', resource: 'Mentor + writing course', timeline: '8-12 weeks' },
      { pct: sc.sectionTotals.logical / 10, area: 'Logical Discourse', action: 'Practice sentence-ordering drills (free online) and analyse paragraph structure in editorial writing.', resource: 'Online drills', timeline: '3-4 weeks' },
    ];
    items.sort((a, b) => a.pct - b.pct); // weakest first
    items.slice(0, 4).forEach(i => roadmap.push(i));
    return roadmap;
  }
};

/* ====================================================================
   ADMIN DB (localStorage-backed)
   ==================================================================== */
const AdminDB = {
  saveCompletedSession(candidate, session, scores) {
    try {
      const all = this.getAll();
      const record = {
        recordId: 'R-' + Date.now() + '-' + Math.random().toString(36).slice(2, 6).toUpperCase(),
        savedAt: Date.now(),
        candidate, session: {
          // Strip the full questions to save space — keep only what's needed for reporting
          id: session.id,
          completedSections: session.completedSections,
          violations: session.violations,
          riskScore: session.riskScore,
          behaviour: session.behaviour,
          startedAt: session.startedAt
        }, scores
      };
      all.unshift(record);
      // cap to 200 records
      const trimmed = all.slice(0, 200);
      localStorage.setItem(CONFIG.ADMIN_DB_KEY, JSON.stringify(trimmed));
    } catch (e) { console.warn('Admin DB save failed', e); }
  },
  getAll() {
    try { return JSON.parse(localStorage.getItem(CONFIG.ADMIN_DB_KEY) || '[]'); } catch (e) { return []; }
  },
  delete(recordId) {
    const all = this.getAll().filter(r => r.recordId !== recordId);
    localStorage.setItem(CONFIG.ADMIN_DB_KEY, JSON.stringify(all));
  },
  exportCSV() {
    const all = this.getAll();
    const headers = ['Candidate ID','Full Name','Email','Mobile','Position','City','State','Experience','Total Score','Proficiency','Risk Score','Risk Level','Grammar/Vocab','Reading','Writing','Logical','Completed At'];
    const rows = all.map(r => [
      r.candidate.candidateId, r.candidate.fullName, r.candidate.email, r.candidate.mobile, r.candidate.position,
      r.candidate.city, r.candidate.state, r.candidate.experience,
      r.scores.total, r.scores.proficiency.level, r.scores.risk.score, r.scores.risk.level,
      r.scores.sectionTotals.grammarVocab, r.scores.sectionTotals.reading, r.scores.sectionTotals.writing, r.scores.sectionTotals.logical,
      new Date(r.scores.generatedAt).toISOString()
    ]);
    const csv = [headers, ...rows].map(row => row.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `ceap_candidates_${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
    URL.revokeObjectURL(url);
  }
};
</script>

<script>
/* ====================================================================
   ADMIN DASHBOARD (bonus — beyond Phase 1 FRD scope)
   ==================================================================== */
let _adminTab = 'overview';
let _adminFilter = { proficiency: '', risk: '' };
let _adminDetailId = null;

function renderAdmin() {
  const wrap = el('div');
  wrap.appendChild(appHeader(
    el('button', { class: 'btn btn-ghost btn-sm', onclick: () => State.set({ screen: 'landing' }) }, '← Back to Candidate Flow')
  ));

  const records = AdminDB.getAll();
  const hero = el('div', { class: 'container mt-6' },
    el('div', { class: 'flex justify-between items-center', style: { flexWrap: 'wrap', gap: '16px' } },
      el('div', {},
        el('span', { class: 'eyebrow' }, el('span', { class: 'dot' }), 'Admin Console'),
        el('h1', { class: 'display', style: { fontSize: '38px', margin: '12px 0 4px 0' } }, 'Assessment Operations'),
        el('p', { class: 'text-muted', style: { margin: 0 } }, `${records.length} candidate${records.length===1?'':'s'} assessed · Data is stored locally in this browser`)
      ),
      el('div', { class: 'flex gap-2', style: { flexWrap: 'wrap' } },
        el('button', { class: 'btn btn-primary btn-sm', onclick: () => importCandidateResults() }, el('span', { html: icon('download', 14), style: { transform: 'rotate(180deg)' } }), 'Import Candidate Results'),
        el('button', { class: 'btn btn-secondary btn-sm', onclick: () => { State.clear(); State.set({ screen: 'registration' }); } }, 'Run Test Yourself'),
        el('button', { class: 'btn btn-ghost btn-sm', onclick: () => AdminDB.exportCSV(), disabled: records.length === 0 }, el('span', { html: icon('download', 14) }), 'Export CSV')
      )
    )
  );
  wrap.appendChild(hero);

  // Tabs
  const tabs = el('div', { class: 'container mt-6', style: { borderBottom: '1px solid var(--ink-200)', display: 'flex', gap: '8px' } },
    el('button', { class: 'admin-tab' + (_adminTab === 'overview' ? ' active' : ''), onclick: () => { _adminTab = 'overview'; render(); } }, 'Overview'),
    el('button', { class: 'admin-tab' + (_adminTab === 'candidates' ? ' active' : ''), onclick: () => { _adminTab = 'candidates'; _adminDetailId = null; render(); } }, `Candidates (${records.length})`),
    el('button', { class: 'admin-tab' + (_adminTab === 'analytics' ? ' active' : ''), onclick: () => { _adminTab = 'analytics'; render(); } }, 'Analytics')
  );
  wrap.appendChild(tabs);

  const content = el('div', { class: 'container mt-6 mb-10' });
  if (_adminTab === 'overview')   content.appendChild(adminOverview(records));
  if (_adminTab === 'candidates') content.appendChild(adminCandidates(records));
  if (_adminTab === 'analytics')  content.appendChild(adminAnalytics(records));
  wrap.appendChild(content);
  wrap.appendChild(footer());
  return wrap;
}

function adminOverview(records) {
  const total = records.length;
  const avgScore = total > 0 ? (records.reduce((s, r) => s + r.scores.total, 0) / total).toFixed(1) : '—';
  const recommended = records.filter(r => r.scores.proficiency.level === 'Advanced' || r.scores.proficiency.level === 'Expert').length;
  const flagged = records.filter(r => r.scores.risk.score >= 31).length;

  const shareCard = renderShareLinkCard();

  const stats = el('div', { class: 'grid grid-4 mb-6' },
    statCard('Total Candidates', total, ''),
    statCard('Average Score', avgScore, '/ 100'),
    statCard('Recommended', recommended, total > 0 ? `${((recommended/total)*100).toFixed(0)}% of total` : ''),
    statCard('Flagged Sessions', flagged, total > 0 ? `Risk ≥ 31` : ''),
  );

  // Proficiency distribution
  const profDist = {};
  CONFIG.PROFICIENCY_LEVELS.forEach(p => profDist[p.level] = 0);
  records.forEach(r => profDist[r.scores.proficiency.level] = (profDist[r.scores.proficiency.level] || 0) + 1);

  const chartCard = el('div', { class: 'card card-pad' },
    el('h3', { style: { margin: '0 0 16px 0', fontSize: '15px', fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.06em', color: 'var(--ink-700)' } }, 'Proficiency Distribution'),
    el('div', { style: { position: 'relative', height: '300px' } }, el('canvas', { id: 'admin-prof-chart' }))
  );

  // Recent activity
  const recentCard = el('div', { class: 'card card-pad' },
    el('h3', { style: { margin: '0 0 16px 0', fontSize: '15px', fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.06em', color: 'var(--ink-700)' } }, 'Recent Activity'),
    records.length === 0
      ? el('p', { class: 'text-muted text-sm' }, 'No candidates yet. Run an assessment to see data here.')
      : el('div', {}, ...records.slice(0, 5).map(r => el('div', {
          class: 'flex justify-between items-center',
          style: { padding: '10px 0', borderBottom: '1px solid var(--ink-200)' }
        },
          el('div', {},
            el('div', { style: { fontSize: '14px', fontWeight: 600 } }, r.candidate.fullName),
            el('div', { class: 'text-xs text-muted' }, `${r.candidate.position} · ${fmtDate(r.scores.generatedAt)}`)
          ),
          el('div', { class: 'flex items-center gap-2' },
            el('span', { class: 'badge', style: { background: r.scores.proficiency.color + '20', color: r.scores.proficiency.color, fontWeight: 700 } }, r.scores.proficiency.level),
            el('strong', { style: { fontSize: '14px' } }, `${r.scores.total}/100`)
          )
        ))
      )
  );

  const grid = el('div', { class: 'grid', style: { gridTemplateColumns: '1.4fr 1fr', gap: '24px' } }, chartCard, recentCard);
  if (window.innerWidth < 900) grid.style.gridTemplateColumns = '1fr';

  // Draw chart after render
  setTimeout(() => {
    const canvas = $('#admin-prof-chart');
    if (canvas && window.Chart) {
      if (canvas._chart) canvas._chart.destroy();
      canvas._chart = new Chart(canvas, {
        type: 'bar',
        data: {
          labels: Object.keys(profDist),
          datasets: [{
            label: 'Candidates',
            data: Object.values(profDist),
            backgroundColor: CONFIG.PROFICIENCY_LEVELS.map(p => p.color),
            borderRadius: 8,
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } }
        }
      });
    }
  }, 50);

  return el('div', {}, shareCard, stats, grid);
}

/* Share-link card: gives admins a one-click candidate URL with ?candidate=1 */
function renderShareLinkCard() {
  const baseUrl = new URL(window.location.href);
  baseUrl.search = '';
  baseUrl.hash = '';
  baseUrl.searchParams.set('candidate', '1');
  const candidateUrl = baseUrl.toString();

  const urlBox = el('div', { class: 'share-link-url' }, candidateUrl);

  return el('div', { class: 'share-link-card mb-6' },
    el('div', { class: 'flex justify-between items-center', style: { flexWrap: 'wrap', gap: '12px' } },
      el('div', {},
        el('div', { class: 'flex items-center gap-2 mb-1' },
          el('span', { html: icon('arrow', 18), style: { color: 'var(--cp-purple-800)' } }),
          el('strong', { style: { color: 'var(--cp-purple-800)', fontSize: '15px' } }, 'Candidate Test Link')
        ),
        el('p', { class: 'text-sm mt-1 mb-0', style: { color: 'var(--ink-700)' } },
          'Share this link with candidates. It hides the Admin Console and only exposes the assessment flow. The admin panel is only reachable from this URL (without the ', el('code', { style: { background: '#fff', padding: '2px 6px', borderRadius: '4px', fontSize: '12px' } }, '?candidate=1'), ' parameter).'
        )
      ),
      el('div', { class: 'flex gap-2' },
        el('button', {
          class: 'btn btn-primary btn-sm',
          onclick: async () => {
            try {
              await navigator.clipboard.writeText(candidateUrl);
              State.set({ modal: { icon: 'check', iconClass: 'info', title: 'Link copied', body: 'The candidate test link has been copied to your clipboard. You can now share it via email, WhatsApp or any other channel.', actions: [{ label: 'Done', class: 'btn-primary', onClick: () => State.set({ modal: null }) }] } });
            } catch (e) {
              // Fallback: select the text
              const range = document.createRange();
              range.selectNode(urlBox);
              window.getSelection().removeAllRanges();
              window.getSelection().addRange(range);
              alert('Could not auto-copy. The link is now selected — press Ctrl/Cmd+C to copy.');
            }
          }
        }, el('span', { html: icon('check', 14) }), 'Copy Link'),
        el('button', {
          class: 'btn btn-secondary btn-sm',
          onclick: () => {
            // Try the Web Share API first, fall back to mailto
            if (navigator.share) {
              navigator.share({
                title: 'CEAP — English Assessment',
                text: 'Please complete your English proficiency assessment via the secure link below.',
                url: candidateUrl
              }).catch(() => {});
            } else {
              const subject = encodeURIComponent('CEAP English Assessment — Your Test Link');
              const body = encodeURIComponent(`Hello,\n\nPlease complete your English proficiency assessment using the link below. The test takes approximately 55 minutes and must be completed in one sitting.\n\n${candidateUrl}\n\nKindly ensure:\n• You have a stable internet connection\n• You allow webcam and fullscreen permissions when prompted\n• You complete the test on a desktop or laptop browser (Chrome / Firefox / Safari / Edge)\n\nBest regards,\nChannelplay Talent Team`);
              window.location.href = `mailto:?subject=${subject}&body=${body}`;
            }
          }
        }, 'Share via Email')
      )
    ),
    urlBox
  );
}

function adminCandidates(records) {
  if (_adminDetailId) {
    const r = records.find(x => x.recordId === _adminDetailId);
    if (r) return adminCandidateDetail(r);
  }

  // Filters
  const filterBar = el('div', { class: 'flex gap-3 mb-4', style: { flexWrap: 'wrap' } },
    el('select', { class: 'select', style: { maxWidth: '200px' }, onchange: (e) => { _adminFilter.proficiency = e.target.value; render(); } },
      el('option', { value: '' }, 'All Proficiency Levels'),
      ...CONFIG.PROFICIENCY_LEVELS.map(p => el('option', { value: p.level, selected: _adminFilter.proficiency === p.level ? 'selected' : null }, p.level))
    ),
    el('select', { class: 'select', style: { maxWidth: '200px' }, onchange: (e) => { _adminFilter.risk = e.target.value; render(); } },
      el('option', { value: '' }, 'All Risk Levels'),
      ...CONFIG.RISK_LEVELS.map(p => el('option', { value: p.level, selected: _adminFilter.risk === p.level ? 'selected' : null }, p.level))
    ),
    (_adminFilter.proficiency || _adminFilter.risk) ? el('button', { class: 'btn btn-ghost btn-sm', onclick: () => { _adminFilter = { proficiency: '', risk: '' }; render(); } }, 'Clear Filters') : null
  );

  let filtered = records;
  if (_adminFilter.proficiency) filtered = filtered.filter(r => r.scores.proficiency.level === _adminFilter.proficiency);
  if (_adminFilter.risk) filtered = filtered.filter(r => r.scores.risk.level === _adminFilter.risk);

  const table = el('div', { class: 'card', style: { overflowX: 'auto' } },
    el('table', { class: 'admin-table' },
      el('thead', {}, el('tr', {},
        el('th', {}, 'Candidate'),
        el('th', {}, 'Position'),
        el('th', {}, 'Score'),
        el('th', {}, 'Proficiency'),
        el('th', {}, 'Risk'),
        el('th', {}, 'Date'),
        el('th', {}, 'Actions')
      )),
      el('tbody', {},
        ...filtered.map(r => el('tr', {},
          el('td', {},
            el('div', { style: { fontWeight: 600 } }, r.candidate.fullName),
            el('div', { class: 'text-xs text-muted' }, r.candidate.candidateId, ' · ', r.candidate.email)
          ),
          el('td', {}, r.candidate.position),
          el('td', { style: { fontWeight: 700 } }, `${r.scores.total}/100`),
          el('td', {}, el('span', { class: 'badge', style: { background: r.scores.proficiency.color + '20', color: r.scores.proficiency.color, fontWeight: 700 } }, r.scores.proficiency.level)),
          el('td', {}, el('span', { class: 'badge', style: { background: r.scores.risk.color + '20', color: r.scores.risk.color, fontWeight: 700 } }, r.scores.risk.level)),
          el('td', { class: 'text-xs text-muted' }, fmtDate(r.scores.generatedAt)),
          el('td', {},
            el('button', { class: 'btn btn-ghost btn-sm', onclick: () => { _adminDetailId = r.recordId; render(); } }, 'View'),
            el('button', { class: 'btn btn-ghost btn-sm', style: { color: 'var(--danger)' }, onclick: () => {
              if (confirm('Delete this assessment record permanently?')) { AdminDB.delete(r.recordId); render(); }
            }}, 'Delete')
          )
        ))
      )
    )
  );

  return el('div', {}, filterBar, records.length === 0
    ? el('div', { class: 'card card-pad text-center text-muted' }, 'No candidates assessed yet. The admin console will populate as assessments are completed.')
    : table);
}

function adminAnalytics(records) {
  if (records.length === 0) {
    return el('div', { class: 'card card-pad text-center text-muted' }, 'No data to analyse yet. Complete some assessments to see analytics here.');
  }

  // Score distribution
  const buckets = { '0-29': 0, '30-44': 0, '45-59': 0, '60-74': 0, '75-100': 0 };
  records.forEach(r => {
    const s = r.scores.total;
    if (s <= 29) buckets['0-29']++;
    else if (s <= 44) buckets['30-44']++;
    else if (s <= 59) buckets['45-59']++;
    else if (s <= 74) buckets['60-74']++;
    else buckets['75-100']++;
  });

  // Section averages
  const sectionAvg = {
    'Grammar & Vocabulary': records.reduce((s, r) => s + r.scores.sectionTotals.grammarVocab, 0) / records.length,
    'Reading': records.reduce((s, r) => s + r.scores.sectionTotals.reading, 0) / records.length,
    'Writing': records.reduce((s, r) => s + r.scores.sectionTotals.writing, 0) / records.length,
    'Logical English': records.reduce((s, r) => s + r.scores.sectionTotals.logical, 0) / records.length,
  };

  // Risk distribution
  const riskBuckets = { 'Minimal': 0, 'Low': 0, 'Medium': 0, 'High': 0, 'Critical': 0 };
  records.forEach(r => riskBuckets[r.scores.risk.level] = (riskBuckets[r.scores.risk.level] || 0) + 1);

  const root = el('div', { class: 'grid grid-2' },
    el('div', { class: 'card card-pad' },
      el('h3', { style: { margin: '0 0 16px 0', fontSize: '15px', fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.06em', color: 'var(--ink-700)' } }, 'Score Distribution'),
      el('div', { style: { position: 'relative', height: '260px' } }, el('canvas', { id: 'chart-score-dist' }))
    ),
    el('div', { class: 'card card-pad' },
      el('h3', { style: { margin: '0 0 16px 0', fontSize: '15px', fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.06em', color: 'var(--ink-700)' } }, 'Section Averages'),
      el('div', { style: { position: 'relative', height: '260px' } }, el('canvas', { id: 'chart-section-avg' }))
    ),
    el('div', { class: 'card card-pad' },
      el('h3', { style: { margin: '0 0 16px 0', fontSize: '15px', fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.06em', color: 'var(--ink-700)' } }, 'Integrity Risk Distribution'),
      el('div', { style: { position: 'relative', height: '260px' } }, el('canvas', { id: 'chart-risk' }))
    ),
    el('div', { class: 'card card-pad' },
      el('h3', { style: { margin: '0 0 16px 0', fontSize: '15px', fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.06em', color: 'var(--ink-700)' } }, 'Position Mix'),
      (function() {
        const pos = {};
        records.forEach(r => pos[r.candidate.position] = (pos[r.candidate.position] || 0) + 1);
        return el('div', { style: { position: 'relative', height: '260px' } }, el('canvas', { id: 'chart-position' }));
      })()
    ),
  );

  setTimeout(() => {
    // Score distribution
    let c = $('#chart-score-dist');
    if (c) {
      if (c._chart) c._chart.destroy();
      c._chart = new Chart(c, {
        type: 'bar',
        data: {
          labels: Object.keys(buckets),
          datasets: [{
            data: Object.values(buckets),
            backgroundColor: ['#DC2626','#EA580C','#D97706','#16A34A','#059669'],
            borderRadius: 8
          }]
        },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
      });
    }
    // Section averages
    c = $('#chart-section-avg');
    if (c) {
      if (c._chart) c._chart.destroy();
      c._chart = new Chart(c, {
        type: 'bar', data: {
          labels: Object.keys(sectionAvg),
          datasets: [{ data: Object.values(sectionAvg), backgroundColor: '#8B21C9', borderRadius: 8 }]
        },
        options: { indexAxis: 'y', responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
      });
    }
    // Risk
    c = $('#chart-risk');
    if (c) {
      if (c._chart) c._chart.destroy();
      c._chart = new Chart(c, {
        type: 'doughnut', data: {
          labels: Object.keys(riskBuckets),
          datasets: [{ data: Object.values(riskBuckets), backgroundColor: ['#16A34A','#84CC16','#D97706','#DC2626','#991B1B'], borderWidth: 0 }]
        },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right' } } }
      });
    }
    // Position
    c = $('#chart-position');
    if (c) {
      const pos = {};
      records.forEach(r => pos[r.candidate.position] = (pos[r.candidate.position] || 0) + 1);
      if (c._chart) c._chart.destroy();
      c._chart = new Chart(c, {
        type: 'pie', data: {
          labels: Object.keys(pos),
          datasets: [{ data: Object.values(pos), backgroundColor: ['#4F1B8C','#8B21C9','#C026D3','#D946EF','#A78BFA','#7C3AED'], borderWidth: 0 }]
        },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right' } } }
      });
    }
  }, 100);

  return root;
}

/* ====================================================================
   APPLICATION BOOTSTRAP
   ==================================================================== */
(function bootstrap() {
  // Mark mode on body FIRST so CSS hooks and screen-readers see the right context
  // even if a compatibility failure aborts the rest of bootstrap.
  State.mode = IS_CANDIDATE_MODE ? 'candidate' : 'admin';
  document.body.setAttribute('data-mode', State.mode);

  // Browser compatibility check
  const isCompatible = (() => {
    try {
      if (!window.fetch || !window.Promise || !document.documentElement.requestFullscreen) return false;
      return true;
    } catch (e) { return false; }
  })();

  if (!isCompatible) {
    document.getElementById('app').innerHTML = `
      <div style="max-width: 480px; margin: 80px auto; padding: 32px; background: #fff; border-radius: 20px; box-shadow: 0 12px 30px rgba(15,5,40,0.12); text-align: center;">
        <h2 style="font-family: 'Playfair Display', serif; color: #DC2626;">Unsupported Browser</h2>
        <p>This assessment requires a modern browser: Chrome 110+, Firefox 110+, Safari 16+, or Edge 110+. Please update your browser or switch to a supported one to continue.</p>
      </div>
    `;
    return;
  }

  // Try to restore session
  State.restore();

  // If the saved session brought us to an admin-only screen while in candidate mode,
  // redirect to the candidate landing screen.
  if (IS_CANDIDATE_MODE && State.screen === 'admin') State.screen = 'landing';

  render();
})();
</script>
