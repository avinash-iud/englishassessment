        { label: 'Resume', class: 'btn-primary', onClick: () => {
          State.modal = null;
          State.set({ screen: State.session.completedSections.length > 0 ? 'test' : 'instructions' });
        }},
        { label: 'Start Fresh', class: 'btn-secondary', onClick: () => {
          State.clear();
          State.set({ screen: 'registration', modal: null });
        }}
      ]
    }});
    return;
  }
  State.set({ screen: 'registration' });
}

/* ====================================================================
   SCREEN: REGISTRATION
   ==================================================================== */
function renderRegistration() {
  const wrap = el('div');
  wrap.appendChild(appHeader());

  const formData = {
    fullName: '', gender: '', mobile: '', email: '',
    qualification: '', city: '', state: '', experience: '',
    position: '', consent: false
  };
  const errors = {};

  const QUALIFICATIONS = ['Below 10th', '10th', '12th', 'Diploma', 'Graduate', 'Post Graduate', 'PhD'];
  const EXPERIENCES = ['Fresher', '<1 year', '1–3 years', '3–5 years', '5–10 years', '10+ years'];
  const STATES = ['Andhra Pradesh','Assam','Bihar','Chhattisgarh','Delhi','Goa','Gujarat','Haryana','Himachal Pradesh','Jharkhand','Karnataka','Kerala','Madhya Pradesh','Maharashtra','Manipur','Meghalaya','Mizoram','Nagaland','Odisha','Punjab','Rajasthan','Sikkim','Tamil Nadu','Telangana','Tripura','Uttar Pradesh','Uttarakhand','West Bengal','Other'];
  const POSITIONS = ['Customer Service Executive','Sales Representative','Field Sales Officer','Tele-caller','Account Manager','Project Manager','Software Engineer','Business Analyst','HR Executive','Trainer','Operations Manager','Other'];
  const GENDERS = ['Male','Female','Non-binary','Prefer not to say'];

  function validate() {
    const e = {};
    if (!formData.fullName.trim()) e.fullName = 'Full name is required.';
    else if (formData.fullName.trim().length < 3) e.fullName = 'Must be at least 3 characters.';
    else if (!/^[A-Za-z\s.'-]+$/.test(formData.fullName)) e.fullName = 'Letters, spaces and punctuation only.';

    if (!formData.gender) e.gender = 'Please select.';

    if (!formData.mobile) e.mobile = 'Mobile number is required.';
    else if (!/^[6-9]\d{9}$/.test(formData.mobile)) e.mobile = '10-digit Indian mobile, starting with 6–9.';

    if (!formData.email) e.email = 'Email is required.';
    else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(formData.email)) e.email = 'Enter a valid email.';

    if (!formData.qualification) e.qualification = 'Please select.';
    if (!formData.city.trim()) e.city = 'City required.';
    if (!formData.state) e.state = 'State required.';
    if (!formData.experience) e.experience = 'Please select.';
    if (!formData.position.trim()) e.position = 'Please specify role.';
    if (!formData.consent) e.consent = 'You must agree to proceed.';

    Object.assign(errors, e);
    return Object.keys(e).length === 0;
  }

  function showError(name, msg) {
    const node = $(`#err-${name}`, formEl);
    if (node) node.textContent = msg || '';
    const input = $(`[data-field="${name}"]`, formEl);
    if (input) input.classList.toggle('invalid', !!msg);
  }
  function clearError(name) { showError(name, ''); delete errors[name]; }

  const formEl = el('form', { class: 'card card-pad-lg', onsubmit: (e) => { e.preventDefault(); onSubmit(); } });

  // ---- Build fields ----
  function field(name, label, control, required = true, hint) {
    return el('div', { class: 'field' },
      el('label', { class: 'field-label' },
        el('span', {}, label, required ? el('span', { class: 'req' }, ' *') : null),
        hint ? el('span', { class: 'field-hint' }, hint) : null
      ),
      control,
      el('div', { class: 'field-error', id: `err-${name}` })
    );
  }

  function input(name, type = 'text', placeholder = '') {
    return el('input', {
      class: 'input', type, placeholder, 'data-field': name, autocomplete: 'off',
      oninput: (e) => { formData[name] = e.target.value; if (errors[name]) { errors[name] = ''; showError(name, ''); } },
      onblur: () => { validateField(name); }
    });
  }

  function validateField(name) {
    // re-run full validation and pull this field's error
    errors[name] = '';
    showError(name, '');
    const prev = { ...errors };
    validate();
    if (errors[name]) showError(name, errors[name]);
    // restore others (don't show until submit attempt)
    Object.keys(prev).forEach(k => { if (k !== name && !$(`#err-${k}`, formEl).textContent) showError(k, ''); });
  }

  function select(name, options, placeholder = 'Select...') {
    const s = el('select', {
      class: 'select', 'data-field': name,
      onchange: (e) => { formData[name] = e.target.value; if (errors[name]) { errors[name]=''; showError(name,''); } }
    });
    s.appendChild(el('option', { value: '' }, placeholder));
    options.forEach(opt => s.appendChild(el('option', { value: opt }, opt)));
    return s;
  }

  function chipGroup(name, options) {
    const group = el('div', { class: 'chip-group', 'data-field': name });
    function refresh() {
      group.innerHTML = '';
      options.forEach(opt => {
        const isActive = formData[name] === opt;
        group.appendChild(el('button', {
          type: 'button',
          class: 'chip' + (isActive ? ' active' : ''),
          onclick: () => { formData[name] = opt; if (errors[name]) { errors[name]=''; showError(name,''); } refresh(); }
        }, opt));
      });
    }
    refresh();
    return group;
  }

  // Compose form rows
  formEl.appendChild(el('div', { class: 'mb-6' },
    el('span', { class: 'eyebrow' }, el('span', { class: 'dot' }), 'Step 1 of 2 — Candidate Registration'),
    el('h2', { class: 'display', style: { fontSize: '32px', margin: '12px 0 8px 0' } }, 'Tell us about yourself'),
    el('p', { class: 'text-muted', style: { margin: 0 } }, 'All fields are required. Your data is processed in accordance with the DPDP Act, 2023.')
  ));

  formEl.appendChild(el('div', { class: 'grid grid-2' },
    field('fullName', 'Full Name', input('fullName', 'text', 'e.g. Anita Sharma')),
    field('gender', 'Gender', chipGroup('gender', GENDERS))
  ));

  formEl.appendChild(el('div', { class: 'grid grid-2 mt-4' },
    field('mobile', 'Mobile Number', input('mobile', 'tel', '10-digit mobile'), true, 'Indian mobile (6–9 start)'),
    field('email', 'Email Address', input('email', 'email', 'name@company.com'))
  ));

  formEl.appendChild(el('div', { class: 'grid grid-2 mt-4' },
    field('qualification', 'Highest Qualification', select('qualification', QUALIFICATIONS)),
    field('experience', 'Total Work Experience', select('experience', EXPERIENCES))
  ));

  formEl.appendChild(el('div', { class: 'grid grid-2 mt-4' },
    field('city', 'Current City', input('city', 'text', 'e.g. Mumbai')),
    field('state', 'State', select('state', STATES))
  ));

  formEl.appendChild(el('div', { class: 'grid grid-2 mt-4' },
    field('position', 'Applying For (Position)', input('position', 'text', 'e.g. Sales Executive')),
    el('div')
  ));

  formEl.appendChild(el('div', { class: 'mt-6' },
    el('div', { class: 'checkbox-row' },
      el('input', { type: 'checkbox', id: 'consent-cb', onchange: (e) => { formData.consent = e.target.checked; if (errors.consent) { errors.consent=''; showError('consent',''); } } }),
      el('label', { for: 'consent-cb' },
        el('strong', {}, 'I agree to the assessment terms and data usage policy. '),
        'I understand that my responses, behavioural signals and webcam frames may be captured for evaluation, scoring and HR review, and that my data will be retained for up to 3 years in accordance with the ',
        el('a', { href: '#', style: { color: 'var(--cp-purple-800)' }, onclick: (e) => e.preventDefault() }, 'DPDP Act 2023'), '.'
      )
    ),
    el('div', { class: 'field-error', id: 'err-consent', style: { marginTop: '8px' } })
  ));

  formEl.appendChild(el('div', { class: 'flex gap-3 mt-8', style: { justifyContent: 'space-between', alignItems: 'center', flexWrap: 'wrap' } },
    el('button', { type: 'button', class: 'btn btn-ghost', onclick: () => State.set({ screen: 'landing' }) }, '← Back'),
    el('button', { type: 'submit', class: 'btn btn-primary btn-lg' }, 'Continue to Instructions', el('span', { html: icon('arrow', 16) }))
  ));

  function onSubmit() {
    const ok = validate();
    Object.keys(errors).forEach(k => showError(k, errors[k]));
    if (!ok) return;

    const candidate = {
      candidateId: generateCandidateId(),
      fullName: formData.fullName.trim(),
      gender: formData.gender,
      mobile: formData.mobile,
      email: formData.email.trim().toLowerCase(),
      qualification: formData.qualification,
      city: formData.city.trim(),
      state: formData.state,
      experience: formData.experience,
      position: formData.position.trim(),
      registeredAt: Date.now(),
      consent: true,
      consentAt: Date.now()
    };
    State.candidate = candidate;
    State.session = State.createSession(candidate);
    State.set({ screen: 'instructions' });
  }

  wrap.appendChild(el('section', { class: 'container-narrow mt-8 mb-10' }, formEl));
  wrap.appendChild(footer());
  return wrap;
}

/* ====================================================================
   SCREEN: INSTRUCTIONS
   ==================================================================== */
function renderInstructions() {
  const wrap = el('div');
  wrap.appendChild(appHeader());

  let agreed = false;
  let apiKey = State.apiKey || '';

  const rules = [
    { icon: 'fullscreen', title: 'Stay in fullscreen mode',  desc: 'Exiting fullscreen will trigger a violation and re-prompt you to return. Repeated exits will impact your integrity score.' },
    { icon: 'eye',        title: 'No tab switching or other windows', desc: 'Switching tabs or moving away from the test window will be detected and logged. Four combined violations auto-submit the current section.' },
    { icon: 'shield',     title: 'Copy/paste is restricted', desc: 'Copying questions or pasting external text into writing tasks is blocked. Attempts are logged silently.' },
    { icon: 'camera',     title: 'Webcam access required',   desc: 'A periodic snapshot will be captured for proctoring. Denying access will block the test. Frames are encrypted in transit and at rest.' },
    { icon: 'clock',      title: 'Each section is timed independently', desc: 'When a section timer ends, your responses are auto-submitted and you move on. You cannot return to a completed section.' },
    { icon: 'alert',      title: 'Inactivity is monitored',  desc: 'No mouse, key or touch activity for 90 seconds triggers a 30-second warning. No response auto-submits the current section.' },
  ];

  const sectionList = [
    { name: 'Grammar & Vocabulary', marks: 35, mins: 20, items: '20 Grammar MCQ + 10 Vocabulary MCQ + 5 Error Correction' },
    { name: 'Reading Comprehension', marks: 30, mins: 12, items: '3 passages with 5 MCQs each' },
    { name: 'Writing Skills', marks: 25, mins: 15, items: 'Task 1 — Email/Memo (10 marks) · Task 2 — Opinion Essay (15 marks)' },
    { name: 'Logical English', marks: 10, mins: 8,  items: '5 Sentence Ordering + 5 Paragraph Completion' },
  ];

  const card = el('div', { class: 'card-glow card-pad-lg' });

  card.appendChild(el('div', { class: 'flex justify-between items-center mb-6', style: { flexWrap: 'wrap', gap: '12px' } },
    el('div', {},
      el('span', { class: 'eyebrow' }, el('span', { class: 'dot' }), 'Step 2 of 2 — Pre-test Briefing'),
      el('h2', { class: 'display', style: { fontSize: '32px', margin: '12px 0 4px 0' } }, 'Before you begin'),
      el('p', { class: 'text-muted', style: { margin: 0 } }, `Candidate ID: `, el('strong', { style: { color: 'var(--ink-900)' } }, State.candidate.candidateId))
    ),
    el('div', { class: 'badge badge-purple' }, '~55 minutes · 100 marks')
  ));

  card.appendChild(el('h3', { class: 'mt-2 mb-3', style: { fontSize: '15px', fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.06em', color: 'var(--cp-purple-800)' } }, 'Section Overview'));
  card.appendChild(el('div', { class: 'grid grid-2 mb-6' },
    ...sectionList.map((s, i) => el('div', { class: 'card card-pad', style: { padding: '16px 18px' } },
      el('div', { class: 'flex justify-between items-center mb-2' },
        el('strong', { style: { fontSize: '14px' } }, `Section ${i+1}`),
        el('span', { class: 'badge badge-neutral' }, `${s.marks} marks · ${s.mins} min`)
      ),
      el('div', { style: { fontSize: '14px', fontWeight: 600, color: 'var(--ink-900)' } }, s.name),
      el('div', { class: 'text-xs text-muted mt-1' }, s.items)
    ))
  ));

  card.appendChild(el('h3', { class: 'mt-2 mb-3', style: { fontSize: '15px', fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.06em', color: 'var(--cp-purple-800)' } }, 'Integrity Rules'));
  card.appendChild(el('div', { class: 'grid grid-2 mb-6' },
    ...rules.map(r => el('div', { class: 'flex gap-3', style: { padding: '12px', background: 'var(--ink-50)', borderRadius: '12px', alignItems: 'flex-start' } },
      el('div', { class: 'modal-icon warn', style: { width: '36px', height: '36px', fontSize: '14px', marginBottom: 0, flexShrink: 0 }, html: icon(r.icon, 16) }),
      el('div', {},
        el('div', { style: { fontWeight: 600, fontSize: '14px', marginBottom: '2px' } }, r.title),
        el('div', { class: 'text-xs text-muted' }, r.desc)
      )
    ))
  ));

  // API Key (admin-only — never shown to candidates on the shared test link)
  if (!IS_CANDIDATE_MODE) {
    card.appendChild(el('div', { class: 'card card-pad', style: { background: 'var(--cp-violet-50)', border: '1px solid var(--cp-violet-100)' } },
      el('div', { class: 'flex items-center gap-2 mb-2' },
        el('span', { html: icon('sparkle', 18), style: { color: 'var(--cp-purple-800)' } }),
        el('strong', { style: { color: 'var(--cp-purple-800)' } }, 'AI Writing Evaluation (Admin preview)')
      ),
      el('p', { class: 'text-sm mt-1 mb-3', style: { color: 'var(--ink-700)' } },
        'You are previewing the candidate flow from the admin environment. Optionally paste your Anthropic API key so this preview run produces a real rubric-based writing score. ',
        el('strong', {}, 'Candidates on the shared test link will never see this field.'),
        ' Their writing will be scored heuristically and flagged for AI re-evaluation in the admin console.'
      ),
      el('input', {
        class: 'input', type: 'password', placeholder: 'sk-ant-... (optional, this preview run only)',
        value: apiKey,
        oninput: (e) => { apiKey = e.target.value; }
      })
    ));
  } else {
    // Candidate-facing reassurance — no API key field
    card.appendChild(el('div', { class: 'card card-pad', style: { background: 'var(--cp-violet-50)', border: '1px solid var(--cp-violet-100)' } },
      el('div', { class: 'flex items-center gap-2 mb-1' },
        el('span', { html: icon('shield', 18), style: { color: 'var(--cp-purple-800)' } }),
        el('strong', { style: { color: 'var(--cp-purple-800)' } }, 'You are ready to begin')
      ),
      el('p', { class: 'text-sm mt-1 mb-0', style: { color: 'var(--ink-700)' } },
        'Your assessment will be securely scored and the report will be returned to the Channelplay talent team. There is nothing further you need to configure — once you tick the box below and press Start, the timer begins.'
      )
    ));
  }

  card.appendChild(el('div', { class: 'mt-6' },
    el('div', { class: 'checkbox-row' },
      el('input', { type: 'checkbox', id: 'agree-cb', onchange: (e) => { agreed = e.target.checked; $('#start-btn', card).disabled = !agreed; } }),
      el('label', { for: 'agree-cb' }, 'I have read and understood the rules above. I agree to maintain fullscreen, allow webcam monitoring, and accept that violations will affect my integrity score.')
    )
  ));

  card.appendChild(el('div', { class: 'flex gap-3 mt-6', style: { justifyContent: 'space-between', alignItems: 'center', flexWrap: 'wrap' } },
    el('button', { type: 'button', class: 'btn btn-ghost', onclick: () => State.set({ screen: 'registration' }) }, '← Back'),
    el('button', {
      id: 'start-btn', class: 'btn btn-primary btn-lg', disabled: true,
      onclick: () => onStart(apiKey)
    }, 'Start Assessment', el('span', { html: icon('arrow', 16) }))
  ));

  function onStart(key) {
    State.apiKey = key.trim();
    // Start test
    State.session.currentSection = 0;
    State.session.sectionStartedAt = Date.now();
    State.session.timeLeft = currentSectionDuration();
    State.set({ screen: 'test' });
    // Activate test mode (fullscreen, anti-cheat, timer)
    setTimeout(() => Test.start(), 100);
  }

  wrap.appendChild(el('section', { class: 'container mt-8 mb-10' }, card));
  wrap.appendChild(footer());
  return wrap;
}

function currentSectionDuration() {
  return [CONFIG.TIMERS.GRAMMAR, CONFIG.TIMERS.READING, CONFIG.TIMERS.WRITING, CONFIG.TIMERS.LOGICAL][State.session.currentSection];
}
function currentSectionKey() {
  return ['grammar','reading','writing','logical'][State.session.currentSection];
}
function currentSectionName() {
  return ['Grammar & Vocabulary','Reading Comprehension','Writing Skills','Logical English'][State.session.currentSection];
}
function currentSectionMarks() {
  return [35, 30, 25, 10][State.session.currentSection];
}
</script>

<script>
/* ====================================================================
   TEST CONTROLLER (timer, anti-cheat, autosave, navigation)
   ==================================================================== */
const Test = {
  timerInterval: null,
  inactivityTimer: null,
  inactivityCountdown: null,
  autosaveTimer: null,
  webcamStream: null,
  webcamSnapshotInterval: null,
  visibilityHandler: null,
  blurHandler: null,
  focusHandler: null,
  fsHandler: null,
  keydownHandler: null,
  contextMenuHandler: null,
  copyHandler: null,
  pasteHandler: null,
  activityHandler: null,
  devtoolsCheckInterval: null,
  lastInactivityReset: Date.now(),
  inactivityModalOpen: false,

  async start() {
    await this.requestFullscreen();
    await this.requestWebcam();
    this.attachAntiCheat();
    this.startTimer();
    this.startAutosave();
    this.resetInactivity();
  },

  async requestFullscreen() {
    try {
      if (document.documentElement.requestFullscreen) {
        await document.documentElement.requestFullscreen();
      }
    } catch (e) { console.warn('Fullscreen denied at start'); }
  },

  async requestWebcam() {
    if (State.session.webcamGranted) return;
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 320, height: 240 }, audio: false });
      this.webcamStream = stream;
      State.session.webcamGranted = true;
      // Periodic frame capture (every 90s) — stored in localStorage as base64 (mock for client-only)
      const video = document.createElement('video');
      video.srcObject = stream;
      video.play();
      const canvas = document.createElement('canvas');
      canvas.width = 160; canvas.height = 120;
      const ctx = canvas.getContext('2d');
      this.webcamSnapshotInterval = setInterval(() => {
        try {
          ctx.drawImage(video, 0, 0, 160, 120);
          // In production this would POST to S3; here we just log it.
          State.session.behaviour.lastWebcamFrame = Date.now();
        } catch(e){}
      }, 90 * 1000);
    } catch (e) {
      // Denial: +25 risk, block test
      this.logViolation('webcam_denied', 25, 'global', false);
      State.set({ modal: {
        icon: 'camera', iconClass: 'danger',
        title: 'Webcam access is required',
        body: 'This assessment requires webcam access for proctoring. Please allow camera access and reload to continue. A flat 25 risk-score penalty has been applied for this denial.',
        actions: [
          { label: 'Try Again', class: 'btn-primary', onClick: async () => { State.modal = null; render(); await this.requestWebcam(); } },
          { label: 'Exit Assessment', class: 'btn-secondary', onClick: () => { this.stop(); State.clear(); render(); } }
        ]
      }});
    }
  },

  attachAntiCheat() {
    // Tab switch / visibility
    this.visibilityHandler = () => {
      if (document.hidden) this.logViolation('tab_switch', 15, currentSectionKey(), true);
    };
    document.addEventListener('visibilitychange', this.visibilityHandler);

    // Window blur/focus
    this.blurHandler = () => {
      if (document.hidden) return; // already counted
      this.logViolation('window_blur', 15, currentSectionKey(), true);
    };
    window.addEventListener('blur', this.blurHandler);

    // Fullscreen
    this.fsHandler = () => {
      if (!document.fullscreenElement) {
        this.logViolation('fullscreen_exit', 10, currentSectionKey(), true);
        // Re-prompt
        State.set({ modal: {
          icon: 'fullscreen', iconClass: 'warn',
          title: 'Return to fullscreen to continue',
          body: 'You have exited fullscreen. Please return to fullscreen mode to resume the assessment.',
          actions: [
            { label: 'Return to Fullscreen', class: 'btn-primary', onClick: async () => {
              try { await document.documentElement.requestFullscreen(); } catch(e){}
              State.set({ modal: null });
            } }
          ]
        }});
      }
    };
    document.addEventListener('fullscreenchange', this.fsHandler);

    // Right-click
    this.contextMenuHandler = (e) => { e.preventDefault(); return false; };
    document.addEventListener('contextmenu', this.contextMenuHandler);

    // Copy
    this.copyHandler = (e) => {
      e.preventDefault();
      this.logViolation('copy_attempt', 5, currentSectionKey(), false);
    };
    document.addEventListener('copy', this.copyHandler);

    // Paste on writing handled per-textarea but global guard too
    this.pasteHandler = (e) => {
      e.preventDefault();
      this.logViolation('paste_attempt', 5, currentSectionKey(), false);
    };
    document.addEventListener('paste', this.pasteHandler);

    // Keyboard shortcuts
    this.keydownHandler = (e) => {
      const k = e.key.toLowerCase();
      const ctrl = e.ctrlKey || e.metaKey;
      if (e.key === 'F12') { e.preventDefault(); this.logViolation('keyshortcut', 5, currentSectionKey(), false); return; }
      if (ctrl && e.shiftKey && ['i','j','c'].includes(k)) { e.preventDefault(); this.logViolation('keyshortcut', 5, currentSectionKey(), false); return; }
      if (ctrl && ['c','v','a','u','s','p','x'].includes(k)) {
        // Allow Ctrl+C/V/X only inside the writing-task-1 textarea is NOT allowed by FRD;
        // Paste is blocked, copy/cut still blocked silently.
        e.preventDefault();
        this.logViolation('keyshortcut', 5, currentSectionKey(), false);
      }
    };
    document.addEventListener('keydown', this.keydownHandler);

    // DevTools detection (poll)
    this.devtoolsCheckInterval = setInterval(() => {
      const wDiff = window.outerWidth - window.innerWidth;
      const hDiff = window.outerHeight - window.innerHeight;
      if (wDiff > 160 || hDiff > 160) {
        // Likely DevTools opened
        this.logViolation('devtools', 20, currentSectionKey(), true, { silent: true });
      }
    }, 3000);

    // Activity for inactivity tracking
    this.activityHandler = () => { this.resetInactivity(); };
    ['mousemove','keydown','touchstart','click'].forEach(ev => document.addEventListener(ev, this.activityHandler));
  },

  detachAntiCheat() {
    if (this.visibilityHandler) document.removeEventListener('visibilitychange', this.visibilityHandler);
    if (this.blurHandler) window.removeEventListener('blur', this.blurHandler);
    if (this.fsHandler) document.removeEventListener('fullscreenchange', this.fsHandler);
    if (this.contextMenuHandler) document.removeEventListener('contextmenu', this.contextMenuHandler);
    if (this.copyHandler) document.removeEventListener('copy', this.copyHandler);
    if (this.pasteHandler) document.removeEventListener('paste', this.pasteHandler);
    if (this.keydownHandler) document.removeEventListener('keydown', this.keydownHandler);
    if (this.activityHandler) ['mousemove','keydown','touchstart','click'].forEach(ev => document.removeEventListener(ev, this.activityHandler));
    if (this.devtoolsCheckInterval) clearInterval(this.devtoolsCheckInterval);
  },

  logViolation(type, pts, section, contributesToAutoSubmit, opts = {}) {
    if (!State.session) return;
    // Category caps
    const caps = { tab_switch: ['tabBlur', 60], window_blur: ['tabBlur', 60], fullscreen_exit: ['fullscreen', 30], devtools: ['devtools', 40], inactivity: ['inactivity', 30], copy_attempt: ['copy', 20], paste_attempt: ['paste', 20] };
    const cat = caps[type];
    if (cat) {
      const key = cat[0], cap = cat[1];
      if ((State.session.categoryRisk[key] || 0) + pts > cap) {
        pts = Math.max(0, cap - (State.session.categoryRisk[key] || 0));
      }
      State.session.categoryRisk[key] = (State.session.categoryRisk[key] || 0) + pts;
    }
    const event = { type, pts, section, t: Date.now(), risk: 0 };
    State.session.violations.push(event);
    State.session.riskScore = Math.min(100, State.session.riskScore + pts);
    event.risk = State.session.riskScore;

    if (contributesToAutoSubmit && ['tab_switch','window_blur','fullscreen_exit'].includes(type)) {
      State.session.autoSubmitCount = (State.session.autoSubmitCount || 0) + 1;
      const remaining = CONFIG.ANTICHEAT.AUTO_SUBMIT_VIOLATION_THRESHOLD - State.session.autoSubmitCount;
      if (remaining > 0 && !opts.silent && type !== 'fullscreen_exit') {
        // Show warning modal with count
        State.set({ modal: {
          icon: 'alert', iconClass: 'warn',
          title: `Violation detected: ${type === 'tab_switch' ? 'Tab switch' : 'Window focus lost'}`,
          body: `This event has been logged. You have ${remaining} more combined violation${remaining===1?'':'s'} before this section is auto-submitted. Risk score is now ${State.session.riskScore}.`,
          actions: [{ label: 'I Understand', class: 'btn-primary', onClick: () => State.set({ modal: null }) }]
        }});
      } else if (State.session.autoSubmitCount >= CONFIG.ANTICHEAT.AUTO_SUBMIT_VIOLATION_THRESHOLD) {
        // Auto-submit current section
        this.autoSubmitSection('integrity_threshold');
      }
    }
    // Update topbar live without full re-render
    const violationStat = $('#violation-count');
    if (violationStat) violationStat.textContent = State.session.violations.length;
    const riskStat = $('#risk-score');
    if (riskStat) riskStat.textContent = State.session.riskScore;
    State.save();
  },

  startTimer() {
    if (this.timerInterval) clearInterval(this.timerInterval);
    if (State.session.timeLeft === null || State.session.timeLeft === undefined) {
      State.session.timeLeft = currentSectionDuration();
    }
    this.timerInterval = setInterval(() => {
      if (!State.session) return;
      State.session.timeLeft = Math.max(0, State.session.timeLeft - 1);
      const tDisp = $('#timer-display');
      if (tDisp) {
        tDisp.textContent = fmtTime(State.session.timeLeft);
        tDisp.classList.toggle('warn', State.session.timeLeft <= 60 && State.session.timeLeft > 30);
        tDisp.classList.toggle('danger', State.session.timeLeft <= 30);
      }
      if (State.session.timeLeft <= 0) {
        clearInterval(this.timerInterval);
        this.autoSubmitSection('timer_expiry');
      }
    }, 1000);
  },

  startAutosave() {
    if (this.autosaveTimer) clearInterval(this.autosaveTimer);
    this.autosaveTimer = setInterval(() => { State.save(); }, 30000);
  },

  resetInactivity() {
    if (this.inactivityTimer) clearTimeout(this.inactivityTimer);
    if (this.inactivityModalOpen) return;
    this.inactivityTimer = setTimeout(() => {
      this.showInactivityModal();
    }, CONFIG.ANTICHEAT.INACTIVITY_THRESHOLD * 1000);
  },

  showInactivityModal() {
    this.inactivityModalOpen = true;
    let secs = CONFIG.ANTICHEAT.INACTIVITY_COUNTDOWN;
    const updateBody = () => el('p', {}, `You appear to be inactive. If you do not respond within `, el('strong', {}, `${secs} seconds`), `, this section will be auto-submitted and you will move on. Move your mouse or press a key to continue.`);
    State.set({ modal: {
      icon: 'alert', iconClass: 'warn',
      title: 'Are you still there?',
      body: updateBody(),
      actions: [
        { label: "I'm here", class: 'btn-primary', onClick: () => {
          if (this.inactivityCountdown) clearInterval(this.inactivityCountdown);
          this.inactivityModalOpen = false;
          State.set({ modal: null });
          this.resetInactivity();
        }}
      ]
    }});
    this.inactivityCountdown = setInterval(() => {
      secs--;
      if (secs <= 0) {
        clearInterval(this.inactivityCountdown);
        this.inactivityModalOpen = false;
        this.logViolation('inactivity', 10, currentSectionKey(), false);
        State.set({ modal: null });
        this.autoSubmitSection('inactivity_timeout');
      } else {
        // Update modal body
        if (State.modal) {
          State.modal.body = updateBody();
          renderModal();
        }
      }
    }, 1000);
  },

  autoSubmitSection(reason) {
    if (!State.session) return;
    if (this.timerInterval) clearInterval(this.timerInterval);
    if (this.inactivityCountdown) clearInterval(this.inactivityCountdown);
    this.inactivityModalOpen = false;
    State.session.behaviour.perSectionDuration[currentSectionKey()] = 
      (currentSectionDuration() - State.session.timeLeft);
    State.session.completedSections.push({ section: currentSectionKey(), reason, completedAt: Date.now() });
    State.session.autoSubmitCount = 0; // reset for next section

    if (State.session.currentSection < 3) {
      // Move to next section
      State.session.currentSection++;
      State.session.currentQuestionIdx = 0;
      State.session.timeLeft = currentSectionDuration();
      State.session.sectionStartedAt = Date.now();
      State.set({ modal: null });
      this.startTimer();
      render();
    } else {
      // All sections done — proceed to evaluation
      this.completeAssessment();
    }
  },

  submitSectionManual() {
    State.set({ modal: {
      icon: 'check', iconClass: 'info',
      title: 'Submit this section?',
      body: 'Once submitted, you cannot return to this section. Your responses will be locked in.',
      actions: [
        { label: 'Cancel', class: 'btn-secondary', onClick: () => State.set({ modal: null }) },
        { label: 'Submit Section', class: 'btn-primary', onClick: () => {
          State.set({ modal: null });
          this.autoSubmitSection('manual');
        }}
      ]
    }});
  },

  async completeAssessment() {
    this.stop();
    // Exit fullscreen
    try { if (document.fullscreenElement) await document.exitFullscreen(); } catch(e){}
    State.set({ screen: 'evaluating' });
    // Run scoring pipeline
    setTimeout(() => Scoring.evaluate().then(scores => {
      State.scores = scores;
      AdminDB.saveCompletedSession(State.candidate, State.session, scores);
      State.set({ screen: 'results' });
    }).catch(err => {
      console.error('Evaluation failed', err);
      alert('Evaluation failed: ' + err.message);
    }), 300);
  },

  stop() {
    if (this.timerInterval) clearInterval(this.timerInterval);
    if (this.autosaveTimer) clearInterval(this.autosaveTimer);
    if (this.inactivityTimer) clearTimeout(this.inactivityTimer);
    if (this.inactivityCountdown) clearInterval(this.inactivityCountdown);
    if (this.webcamSnapshotInterval) clearInterval(this.webcamSnapshotInterval);
    if (this.webcamStream) { this.webcamStream.getTracks().forEach(t => t.stop()); this.webcamStream = null; }
    this.detachAntiCheat();
    this.inactivityModalOpen = false;
  }
};

/* ====================================================================
   SCREEN: TEST — one-question-at-a-time with sidebar navigation
   ==================================================================== */

/* Build a flat, ordered question list for the current section. Each entry
   describes a single navigable question and how to render/score it. */
function buildQuestionListForSection(sectionKey, questions) {
  const list = [];
  if (sectionKey === 'grammar') {
    questions.grammar.forEach(q => list.push({ kind: 'mcq', sub: 'Grammar', q, bank: 'grammar' }));
    questions.vocabulary.forEach(q => list.push({ kind: 'mcq', sub: 'Vocabulary', q, bank: 'vocabulary' }));
    questions.errorCorrection.forEach(q => list.push({ kind: 'ec', sub: 'Error Correction', q, bank: 'errorCorrection' }));
  } else if (sectionKey === 'reading') {
    questions.reading.forEach((p, pIdx) => {
      p.questions.forEach(q => list.push({ kind: 'mcq_reading', sub: 'Passage ' + (pIdx + 1), q, passage: p }));
    });
  } else if (sectionKey === 'writing') {
    list.push({ kind: 'writing', sub: 'Task 1 — Email/Memo',   q: questions.writingTask1, taskNo: 1, minW: 150, maxW: 200, marks: 10, key: 'writingTask1' });
    list.push({ kind: 'writing', sub: 'Task 2 — Opinion Essay', q: questions.writingTask2, taskNo: 2, minW: 250, maxW: 300, marks: 15, key: 'writingTask2' });
  } else if (sectionKey === 'logical') {
    questions.sentenceOrdering.forEach(q => list.push({ kind: 'sentence_ordering', sub: 'Sentence Ordering', q }));
    questions.paraCompletion.forEach(q => list.push({ kind: 'mcq', sub: 'Paragraph Completion', q, bank: 'paraCompletion' }));
  }
  return list;
}

function isItemAnswered(item) {
  const a = State.session.answers;
  switch (item.kind) {
    case 'mcq':
      return a[item.bank] && a[item.bank][item.q.id] !== undefined;
    case 'ec':
      return a.errorCorrection[item.q.id] !== undefined;
    case 'mcq_reading':
      return a.reading[item.passage.id] && a.reading[item.passage.id][item.q.id] !== undefined;
    case 'writing':
      return a[item.key] && a[item.key].trim().length > 0;
    case 'sentence_ordering':
      return a.sentenceOrdering[item.q.id] !== undefined;
  }
  return false;
}

function renderTest() {
  const wrap = el('div', { class: 'test-shell' });
  const s = State.session;
  const sectionKey = currentSectionKey();
  const sectionName = currentSectionName();
  const questionList = buildQuestionListForSection(sectionKey, s.questions);

  // Default to first question
  if (s.currentQuestionIdx === undefined || s.currentQuestionIdx === null) s.currentQuestionIdx = 0;
  const activeIdx = Math.max(0, Math.min(s.currentQuestionIdx, questionList.length - 1));
  s.currentQuestionIdx = activeIdx;
  const activeItem = questionList[activeIdx];

  // ---------- Topbar ----------
  const answeredCount = questionList.filter(isItemAnswered).length;
  wrap.appendChild(el('div', { class: 'test-topbar-v2' },
    el('div', { class: 'flex items-center gap-4' },
      brandMark(),
      el('div', { class: 'section-pill' }, `Section ${s.currentSection + 1} of 4 · ${sectionName}`)
    ),
    el('div', { class: 'flex items-center gap-3' },
      el('div', { class: 'topbar-stat' }, el('span', { html: icon('check', 14) }), `${answeredCount} / ${questionList.length} answered`),
      el('div', { class: 'topbar-stat' + (s.violations.length > 0 ? ' warn' : '') },
        el('span', { html: icon('alert', 14) }),
        'Violations: ', el('strong', { id: 'violation-count' }, String(s.violations.length))
      ),
      el('div', { class: 'topbar-stat' },
        el('span', { html: icon('shield', 14) }),
        'Risk: ', el('strong', { id: 'risk-score' }, String(s.riskScore))
      ),
      el('div', { class: 'topbar-stat' },
        el('span', { html: icon('clock', 14) }),
        el('span', { id: 'timer-display', class: 'timer-display' }, fmtTime(s.timeLeft))
      ),
      el('button', { class: 'btn btn-primary btn-sm', onclick: () => Test.submitSectionManual() }, 'Submit Section')
    )
  ));

  // ---------- Main layout: sidebar + question area ----------
  wrap.appendChild(el('div', { class: 'test-layout' },
    renderTestSidebar(questionList, activeIdx, sectionKey),
    renderTestMain(activeItem, activeIdx, questionList)
  ));

  return wrap;
}

/* ---------- Sidebar: section progression + question grid ---------- */
function renderTestSidebar(questionList, activeIdx, sectionKey) {
  const sidebar = el('aside', { class: 'test-sidebar' });

  // Section progression (locked — fixed order per FRD §4.5)
  sidebar.appendChild(el('div', { class: 'sidebar-heading' }, 'Assessment Sections'));
  const sections = [
    { key: 'grammar', name: 'Grammar & Vocab', marks: 35, idx: 0 },
    { key: 'reading', name: 'Reading',         marks: 30, idx: 1 },
    { key: 'writing', name: 'Writing',         marks: 25, idx: 2 },
    { key: 'logical', name: 'Logical English', marks: 10, idx: 3 },
  ];
  const track = el('div', { class: 'section-track' });
  const currentIdx = State.session.currentSection;
  sections.forEach(sec => {
    const isActive = sec.idx === currentIdx;
    const isDone = sec.idx < currentIdx;
    track.appendChild(el('div', { class: 'section-track-item' + (isActive ? ' active' : '') + (isDone ? ' locked-done' : '') },
      el('span', {}, `${sec.idx + 1}. ${sec.name}`),
      isDone ? el('span', { class: 'check-mark', html: icon('check', 14) }) : el('span', { class: 'text-xs text-muted' }, `${sec.marks} m`)
    ));
  });
  sidebar.appendChild(track);

  // Question grid for current section
  sidebar.appendChild(el('div', { class: 'sidebar-heading' }, 'Questions in this Section'));

  // Group by sub-section for visual clarity
  const groups = {};
  questionList.forEach((item, idx) => {
    if (!groups[item.sub]) groups[item.sub] = [];
    groups[item.sub].push({ item, idx });
  });

  Object.entries(groups).forEach(([subLabel, items]) => {
    sidebar.appendChild(el('div', { class: 'q-subgroup-label' }, subLabel));
    const grid = el('div', { class: 'q-grid' });
    items.forEach(({ item, idx }) => {
      const isActive = idx === activeIdx;
      const answered = isItemAnswered(item);
      let cls = 'q-num-btn';
      if (isActive) cls += ' active';
      cls += answered ? ' answered' : ' pending';
      grid.appendChild(el('button', {
        class: cls,
        title: `Question ${idx + 1} — ${answered ? 'Answered' : 'Pending'}`,
        onclick: () => { State.session.currentQuestionIdx = idx; State.save(); render(); }
      }, String(idx + 1)));
    });
    sidebar.appendChild(grid);
  });

  // Legend
  sidebar.appendChild(el('div', { class: 'legend' },
    el('div', { class: 'legend-row' }, el('span', { class: 'legend-chip answered' }), 'Answered'),
    el('div', { class: 'legend-row' }, el('span', { class: 'legend-chip pending' }),  'Not yet answered'),
    el('div', { class: 'legend-row' }, el('span', { class: 'legend-chip active' }),   'Current question'),
  ));

  return sidebar;
}

/* ---------- Main: header + active question + nav bar ---------- */
function renderTestMain(item, activeIdx, questionList) {
  const main = el('section', { class: 'test-main' });

  // Question area header
  main.appendChild(el('div', { class: 'q-area-head' },
    el('div', { class: 'q-counter' },
      el('strong', {}, String(activeIdx + 1)),
      el('span', {}, `of ${questionList.length}`)
    ),
    el('div', { class: 'q-subtype' }, item.sub)
  ));

  // Active question content
  main.appendChild(renderActiveQuestion(item));

  // Bottom navigation
  main.appendChild(renderQuestionNavBar(activeIdx, questionList));

  return main;
}

function renderQuestionNavBar(activeIdx, questionList) {
  const isFirst = activeIdx === 0;
  const isLast = activeIdx === questionList.length - 1;
  const goTo = (idx) => { State.session.currentQuestionIdx = idx; State.save(); render(); };

  return el('div', { class: 'q-nav-bar' },
    el('button', {
      class: 'btn btn-secondary',
      disabled: isFirst,
      onclick: () => { if (!isFirst) goTo(activeIdx - 1); }
    }, '← Previous'),
    el('div', { class: 'center-actions' },
      el('span', { class: 'text-sm text-muted' }, `Auto-saved`),
      el('span', { html: icon('check', 14), style: { color: 'var(--success)' } })
    ),
    isLast
      ? el('button', { class: 'btn btn-primary', onclick: () => Test.submitSectionManual() }, 'Review & Submit Section', el('span', { html: icon('arrow', 16) }))
      : el('button', { class: 'btn btn-primary', onclick: () => goTo(activeIdx + 1) }, 'Next', el('span', { html: icon('arrow', 16) }))
  );
}

/* ====================================================================
   ACTIVE QUESTION RENDERERS (one at a time)
   ==================================================================== */

function renderActiveQuestion(item) {
  const content = el('div', { class: 'q-content' });
  switch (item.kind) {
    case 'mcq':            content.appendChild(renderActiveMCQ(item)); break;
    case 'mcq_reading':    content.appendChild(renderActiveReadingMCQ(item)); break;
    case 'ec':             content.appendChild(renderActiveErrorCorrection(item)); break;
    case 'writing':        content.appendChild(renderActiveWriting(item)); break;
    case 'sentence_ordering': content.appendChild(renderActiveSentenceOrdering(item)); break;
  }
  return content;
}

function renderActiveMCQ(item) {
  const a = State.session.answers[item.bank];
  if (!a[item.q.id] && a[item.q.id] !== 0) a[item.q.id] = undefined;

  // Para completion uses paragraph text rather than stem
  const stem = item.bank === 'paraCompletion' ? item.q.paragraph : item.q.stem;

  return el('div', {},
    el('div', { class: 'q-stem-large' }, stem),
    el('div', { class: 'q-option-list' },
      ...item.q.options.map((opt, oIdx) => {
        const selected = a[item.q.id] === oIdx;
        return el('div', {
          class: 'q-option' + (selected ? ' selected' : ''),
          onclick: () => {
            if (a[item.q.id] === oIdx) delete a[item.q.id];
            else a[item.q.id] = oIdx;
            State.session.behaviour.lastAnswerAt = Date.now();
            State.save();
            render();
          }
        },
          el('div', { class: 'q-option-letter' }, String.fromCharCode(65 + oIdx)),
          el('div', { class: 'q-option-text' }, opt)
        );
      })
    )
  );
}

function renderActiveReadingMCQ(item) {
  const a = State.session.answers.reading;
  if (!a[item.passage.id]) a[item.passage.id] = {};
  const ans = a[item.passage.id];

  return el('div', {},
    // Passage block
    el('div', { class: 'passage-block' },
      el('div', { class: 'flex items-center gap-2 mb-2' },
        el('span', { class: 'badge badge-purple' }, item.passage.topic),
        el('span', { class: 'badge badge-neutral' }, item.passage.difficulty === 'E' ? 'Easy' : item.passage.difficulty === 'M' ? 'Medium' : 'Hard')
      ),
      el('h4', {}, item.passage.title),
      ...item.passage.passage.split('\n\n').map(para => el('p', {}, para))
    ),
    // Question
    el('div', { class: 'q-stem-large' }, item.q.stem),
    el('div', { class: 'q-option-list' },
      ...item.q.options.map((opt, oIdx) => {
        const selected = ans[item.q.id] === oIdx;
        return el('div', {
          class: 'q-option' + (selected ? ' selected' : ''),
          onclick: () => {
            if (ans[item.q.id] === oIdx) delete ans[item.q.id];
            else ans[item.q.id] = oIdx;
            State.session.behaviour.lastAnswerAt = Date.now();
            State.save();
            render();
          }
        },
          el('div', { class: 'q-option-letter' }, String.fromCharCode(65 + oIdx)),
          el('div', { class: 'q-option-text' }, opt)
        );
      })
    )
  );
}

function renderActiveErrorCorrection(item) {
  const a = State.session.answers.errorCorrection;
  const wordsRow = el('div', { class: 'ec-sentence-large' });
  item.q.words.forEach((w, idx) => {
    const selected = a[item.q.id] === idx;
    wordsRow.appendChild(el('span', {
      class: 'ec-word' + (selected ? ' selected' : ''),
      onclick: () => {
        if (a[item.q.id] === idx) delete a[item.q.id];
        else a[item.q.id] = idx;
        State.save();
        render();
      }
    }, w));
    if (idx < item.q.words.length - 1) wordsRow.appendChild(document.createTextNode(' '));
  });

  return el('div', {},
    el('div', { class: 'q-stem-large' }, 'Click the incorrect word in the sentence below:'),
    wordsRow
  );
}

function renderActiveWriting(item) {
  const a = State.session.answers;
  const initialValue = a[item.key] || '';
  const wc0 = countWords(initialValue);

  const taskHeader = el('div', { class: 'flex justify-between items-center mb-3' },
    el('h3', { class: 'display', style: { fontSize: '22px', margin: 0 } }, `Task ${item.taskNo} ${item.taskNo === 1 ? '— Email / Memo' : '— Opinion Essay'}`),
    el('span', { class: 'badge badge-purple' }, `${item.marks} marks · ${item.minW}–${item.maxW} words`)
  );

  const wcBadge = el('span', { class: 'word-count-badge' }, `${wc0} word${wc0 === 1 ? '' : 's'}`);
  function refreshBadge(v) {
    const wc = countWords(v);
    const cls = wc < item.minW ? 'below' : (wc > item.maxW ? 'over' : 'ok');
    wcBadge.className = `word-count-badge ${cls}`;
    wcBadge.textContent = `${wc} word${wc === 1 ? '' : 's'}`;
  }
  refreshBadge(initialValue);

  const textarea = el('textarea', {
    class: 'writing-textarea-large',
    placeholder: 'Begin your response here...',
    onpaste: (e) => { e.preventDefault(); Test.logViolation('paste_attempt', 5, 'writing', false); },
    oninput: (e) => {
      a[item.key] = e.target.value;
      State.session.behaviour.lastAnswerAt = Date.now();
      refreshBadge(e.target.value);
      // Don't full-render on every keystroke — would lose focus. Re-render is triggered on navigation.
    }
  }, initialValue);

  return el('div', {},
    taskHeader,
    el('div', { class: 'writing-prompt-large' }, item.q.prompt),
    textarea,
    el('div', { class: 'wc-bar' },
      wcBadge,
      el('span', { class: 'wc-target' }, `Target: ${item.minW}–${item.maxW} words · Pasting is blocked`)
    )
  );
}

/* ---------- Sentence Ordering: drag-and-drop + arrow controls + explicit Confirm ---------- */
function renderActiveSentenceOrdering(item) {
  const a = State.session.answers.sentenceOrdering;
  // currentOrder is an array of display indices (0..n-1), in the candidate's chosen order.
  const currentOrder = a[item.q.id] ? [...a[item.q.id]] : item.q.displaySentences.map((_, i) => i);
  const isAnswered = !!a[item.q.id];

  const wrap = el('div', {});
  wrap.appendChild(el('div', { class: 'q-stem-large' },
    'Drag the sentences below — or use the ↑ ↓ buttons on each row — to arrange them into the most logical reading order.'
  ));
  wrap.appendChild(el('div', { class: 'so-instructions' },
    el('span', { html: icon('sparkle', 14) }),
    el('span', {},
      isAnswered
        ? 'Your order is locked in. You can keep refining it — every change is auto-saved.'
        : 'Once you are happy with the order, press ', el('strong', {}, 'Lock in this order'), ' below to mark this question answered.'
    )
  ));

  const list = el('div', { class: 'so-list' });
  let dragFromPos = null;

  function commit(newOrder) {
    a[item.q.id] = newOrder;
    State.session.behaviour.lastAnswerAt = Date.now();
    State.save();
    render();
  }

  function moveByOffset(fromPos, offset) {
    const target = fromPos + offset;
    if (target < 0 || target >= currentOrder.length) return;
    const next = [...currentOrder];
    const [removed] = next.splice(fromPos, 1);
    next.splice(target, 0, removed);
    commit(next);
  }

  currentOrder.forEach((displayIdx, pos) => {
    const isFirst = pos === 0;
    const isLast = pos === currentOrder.length - 1;
    const row = el('div', {
      class: 'so-item-v2',
      draggable: true,
      ondragstart: (e) => {
        dragFromPos = pos;
        row.classList.add('dragging');
        try { e.dataTransfer.setData('text/plain', String(pos)); e.dataTransfer.effectAllowed = 'move'; } catch(_) {}
      },
      ondragend: () => { row.classList.remove('dragging'); dragFromPos = null; document.querySelectorAll('.so-item-v2.drop-target').forEach(n => n.classList.remove('drop-target')); },
      ondragover: (e) => { e.preventDefault(); row.classList.add('drop-target'); },
      ondragleave: () => { row.classList.remove('drop-target'); },
      ondrop: (e) => {
        e.preventDefault();
        row.classList.remove('drop-target');
        const from = dragFromPos !== null ? dragFromPos : parseInt(e.dataTransfer.getData('text/plain') || '-1', 10);
        if (from === -1 || from === pos) return;
        const next = [...currentOrder];
        const [removed] = next.splice(from, 1);
        next.splice(pos, 0, removed);
        commit(next);
      }
    },
      el('div', { class: 'so-pos-v2' }, String(pos + 1)),
      el('div', { class: 'so-handle-v2', title: 'Drag to reorder', html: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="9" cy="6" r="1"/><circle cx="15" cy="6" r="1"/><circle cx="9" cy="12" r="1"/><circle cx="15" cy="12" r="1"/><circle cx="9" cy="18" r="1"/><circle cx="15" cy="18" r="1"/></svg>' }),
      el('div', { class: 'so-text-v2' }, item.q.displaySentences[displayIdx]),
      el('div', { class: 'so-arrows-v2' },
        el('button', { class: 'so-arrow-btn', title: 'Move up',   disabled: isFirst, onclick: () => moveByOffset(pos, -1) }, '↑'),
        el('button', { class: 'so-arrow-btn', title: 'Move down', disabled: isLast,  onclick: () => moveByOffset(pos, +1) }, '↓')
      )
    );
    list.appendChild(row);
  });

  wrap.appendChild(list);

  // Explicit commit row (prominent, not buried as a tip)
  wrap.appendChild(el('div', {
    class: 'so-commit-row',
    style: {
      marginTop: '20px',
      padding: '14px 18px',
      borderRadius: '12px',
      background: isAnswered ? 'var(--success-50)' : 'var(--warning-50)',
      border: '1px dashed ' + (isAnswered ? 'var(--success)' : 'var(--warning)'),
      display: 'flex',
      justifyContent: 'space-between',
      alignItems: 'center',
      gap: '12px',
      flexWrap: 'wrap'
    }
  },
    el('div', { class: 'flex items-center gap-2' },
      el('span', { html: icon(isAnswered ? 'check' : 'alert', 16), style: { color: isAnswered ? 'var(--success)' : 'var(--warning)' } }),
      el('span', { style: { fontSize: '13px', fontWeight: 600, color: isAnswered ? 'var(--success)' : 'var(--warning)' } },
        isAnswered ? 'Locked in. Auto-saving any further changes.' : 'This question is pending until you confirm your order.'
      )
    ),
    el('button', {
      class: 'btn ' + (isAnswered ? 'btn-secondary' : 'btn-primary') + ' btn-sm',
      onclick: () => commit([...currentOrder])
    }, isAnswered ? 'Re-confirm Current Order' : 'Lock in this order')
  ));
  return wrap;
}

function computeAnsweredCount(sectionKey) {
  const list = buildQuestionListForSection(sectionKey, State.session.questions);
  return list.filter(isItemAnswered).length;
}
function computeTotalCount(sectionKey) {
  return buildQuestionListForSection(sectionKey, State.session.questions).length;
}

<script>
/* ====================================================================
   SCORING ENGINE
   ==================================================================== */
const Scoring = {

  async evaluate() {
    const s = State.session;
    const q = s.questions;
    const a = s.answers;

    // ----- Deterministic scoring -----
    // Grammar: 20 questions × 1 mark = 20
    let grammarScore = 0;
    const grammarBreakdown = {}; // competency -> {correct, total}
    q.grammar.forEach(item => {
      const sel = a.grammar[item.id];
      const correct = sel === item.correct;
      if (correct) grammarScore++;
      const c = item.competency;
      if (!grammarBreakdown[c]) grammarBreakdown[c] = { correct: 0, total: 0 };
      grammarBreakdown[c].total++;
      if (correct) grammarBreakdown[c].correct++;
    });

    // Vocabulary: 10 × 1 = 10
    let vocabScore = 0;
    const vocabBreakdown = {};
    q.vocabulary.forEach(item => {
      const sel = a.vocabulary[item.id];
      const correct = sel === item.correct;
      if (correct) vocabScore++;
      const c = item.competency;
      if (!vocabBreakdown[c]) vocabBreakdown[c] = { correct: 0, total: 0 };
      vocabBreakdown[c].total++;
      if (correct) vocabBreakdown[c].correct++;
    });

    // Error Correction: 5 × 1 = 5
    let ecScore = 0;
    q.errorCorrection.forEach(item => {
      const sel = a.errorCorrection[item.id];
      if (sel === item.errorIndex) ecScore++;
    });

    // Reading: 15 questions × 2 = 30
    let readingScore = 0;
    const readingPerPassage = [];
    q.reading.forEach(p => {
      let pCorrect = 0;
      p.questions.forEach(qItem => {
        const sel = (a.reading[p.id] || {})[qItem.id];
        if (sel === qItem.correct) pCorrect++;
      });
      readingPerPassage.push({ id: p.id, title: p.title, topic: p.topic, difficulty: p.difficulty, correct: pCorrect, total: p.questions.length, marks: pCorrect * 2 });
      readingScore += pCorrect * 2;
    });

    // Logical English: sentence ordering 5 × 1 + para completion 5 × 1 = 10
    let soScore = 0;
    q.sentenceOrdering.forEach(item => {
      const submitted = a.sentenceOrdering[item.id];
      if (!submitted) return;
      const isCorrect = submitted.length === item.correctDisplayOrder.length &&
        submitted.every((v, i) => v === item.correctDisplayOrder[i]);
      if (isCorrect) soScore++;
    });
    let pcScore = 0;
    q.paraCompletion.forEach(item => {
      const sel = a.paraCompletion[item.id];
      if (sel === item.correct) pcScore++;
    });
    const logicalScore = soScore + pcScore;

    // ----- Writing evaluation -----
    const writingResult = await this.evaluateWriting(q.writingTask1, q.writingTask2, a.writingTask1, a.writingTask2);

    // ----- Compose totals -----
    const grammarSectionTotal = grammarScore + vocabScore + ecScore; // /35
    const writingSectionTotal = writingResult.task1.score + writingResult.task2.score; // /25

    const total = grammarSectionTotal + readingScore + writingSectionTotal + logicalScore;

    // ----- Proficiency level -----
    const proficiency = CONFIG.PROFICIENCY_LEVELS.find(p => total >= p.min && total <= p.max);
    // ----- Risk level -----
    const risk = CONFIG.RISK_LEVELS.find(r => s.riskScore >= r.min && s.riskScore <= r.max);

    // ----- Strengths & weaknesses -----
    const subScores = [
      { label: 'Grammar', pct: grammarScore / 20 },
      { label: 'Vocabulary', pct: vocabScore / 10 },
      { label: 'Error Correction', pct: ecScore / 5 },
      { label: 'Reading Comprehension', pct: readingScore / 30 },
      { label: 'Writing — Task 1', pct: writingResult.task1.score / 10 },
      { label: 'Writing — Task 2', pct: writingResult.task2.score / 15 },
      { label: 'Sentence Ordering', pct: soScore / 5 },
      { label: 'Paragraph Completion', pct: pcScore / 5 },
    ];
    const strengths = subScores.filter(s => s.pct >= 0.7).sort((a,b) => b.pct - a.pct).slice(0, 3);
    const weaknesses = subScores.filter(s => s.pct < 0.5).sort((a,b) => a.pct - b.pct).slice(0, 3);

    // Hiring recommendation text
    let hiringRecommendation = proficiency.indicator;

    return {
      total,
      maxTotal: 100,
      sections: {
        grammar: { score: grammarScore, max: 20 },
        vocabulary: { score: vocabScore, max: 10 },
        errorCorrection: { score: ecScore, max: 5 },
        reading: { score: readingScore, max: 30, perPassage: readingPerPassage },
        writingTask1: writingResult.task1,
        writingTask2: writingResult.task2,
        sentenceOrdering: { score: soScore, max: 5 },
        paraCompletion: { score: pcScore, max: 5 }
      },
      sectionTotals: {
        grammarVocab: grammarSectionTotal,
        reading: readingScore,
        writing: writingSectionTotal,
        logical: logicalScore
      },
      proficiency,
      risk: { score: s.riskScore, ...risk },
      strengths, weaknesses,
      grammarBreakdown, vocabBreakdown,
      hiringRecommendation,
      aiEvaluationStatus: writingResult.status, // 'ai_evaluated' | 'heuristic' | 'pending'
      generatedAt: Date.now(),
      sessionMeta: {
        duration: s.behaviour.perSectionDuration,
        violations: s.violations,
        totalQuestionsAttempted: this._countAttempted(),
      }
    };
  },

  _countAttempted() {
    const a = State.session.answers;
    let n = Object.keys(a.grammar).length + Object.keys(a.vocabulary).length + Object.keys(a.errorCorrection).length;
    Object.values(a.reading).forEach(p => n += Object.keys(p || {}).length);
    if (a.writingTask1.trim()) n++;
    if (a.writingTask2.trim()) n++;
    n += Object.keys(a.sentenceOrdering).length + Object.keys(a.paraCompletion).length;
    return n;
  },

  async evaluateWriting(task1Prompt, task2Prompt, task1Response, task2Response) {
    if (State.apiKey && State.apiKey.startsWith('sk-')) {
      try {
        const aiResult = await this.callClaude(task1Prompt, task2Prompt, task1Response, task2Response);
        return { ...aiResult, status: 'ai_evaluated' };
      } catch (e) {
        console.warn('Claude API call failed, falling back to heuristic:', e);
        return { ...this.heuristicWriting(task1Response, task2Response), status: 'heuristic_fallback' };
      }
    }
    return { ...this.heuristicWriting(task1Response, task2Response), status: 'heuristic' };
  },

  async callClaude(task1Prompt, task2Prompt, task1Response, task2Response) {
    const systemPrompt = `You are a certified English language examiner with extensive experience evaluating professional written communication against IELTS-aligned rubrics. You are evaluating two writing tasks submitted by a candidate for an employment English proficiency assessment. You must respond ONLY in strict JSON format matching the schema provided. Be fair, consistent, and base your scores strictly on the rubric criteria.`;

    const userPrompt = `Evaluate the following two writing tasks against the rubrics.

# TASK 1 — Professional Email/Memo (10 marks total)

## Prompt:
${task1Prompt.prompt}

## Candidate Response (${countWords(task1Response)} words):
${task1Response || '(no response submitted)'}

## Task 1 Rubric:
- Task Achievement (3 marks): All required elements addressed; appropriate format and professional register
- Coherence & Organisation (3 marks): Logical sequencing; effective paragraph structure; linking devices used
- Vocabulary & Language (2 marks): Appropriate professional vocabulary; avoidance of informal register
- Grammar & Accuracy (2 marks): Range of structures; error frequency and impact on communication

# TASK 2 — Opinion Essay (15 marks total)

## Prompt:
${task2Prompt.prompt}

## Candidate Response (${countWords(task2Response)} words):
${task2Response || '(no response submitted)'}

## Task 2 Rubric:
- Argument & Task Response (4 marks): Clear position; relevant ideas; well-supported with examples
- Coherence & Paragraphing (4 marks): Introduction/body/conclusion structure; paragraph unity; logical flow
- Lexical Resource (4 marks): Vocabulary variety and precision; collocational accuracy; paraphrasing
- Grammatical Range & Accuracy (3 marks): Sentence variety; complex structures; error density; communication impact

# Required Response Format (strict JSON, no markdown fences, no preamble):

{
  "task1": {
    "criteria": {
      "taskAchievement": { "score": <0-3>, "feedback": "<one sentence>" },
      "coherence": { "score": <0-3>, "feedback": "<one sentence>" },
      "vocabulary": { "score": <0-2>, "feedback": "<one sentence>" },
      "grammar": { "score": <0-2>, "feedback": "<one sentence>" }
    },
    "summary": "<2-3 sentence overall feedback>",
    "score": <sum of criteria scores 0-10>,
    "wordCount": ${countWords(task1Response)}
  },
  "task2": {
    "criteria": {
      "argument": { "score": <0-4>, "feedback": "<one sentence>" },
      "coherence": { "score": <0-4>, "feedback": "<one sentence>" },
      "lexical": { "score": <0-4>, "feedback": "<one sentence>" },
      "grammar": { "score": <0-3>, "feedback": "<one sentence>" }
    },
    "summary": "<2-3 sentence overall feedback>",
    "score": <sum of criteria scores 0-15>,
    "wordCount": ${countWords(task2Response)}
  },
  "overallStrengths": ["<bullet>", "<bullet>", "<bullet>"],
  "overallImprovements": ["<bullet>", "<bullet>", "<bullet>"]
}

If a response is empty or just a few words, score zero on relevant criteria. Be honest but constructive in feedback.`;

    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 30000);

    const tryCall = async () => {
      const resp = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': State.apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        signal: controller.signal,
        body: JSON.stringify({
          model: CONFIG.AI_MODEL,
          max_tokens: 1500,
          system: systemPrompt,
          messages: [{ role: 'user', content: userPrompt }]
        })
      });
      if (!resp.ok) {
        const err = await resp.text();
        throw new Error(`API ${resp.status}: ${err}`);
      }
      const data = await resp.json();
      const text = (data.content || []).filter(c => c.type === 'text').map(c => c.text).join('');
      const cleaned = text.replace(/^```json\s*/i, '').replace(/```$/, '').trim();
      const parsed = JSON.parse(cleaned);
      return parsed;
    };

    try {
      const result = await tryCall();
      clearTimeout(timeout);
      return result;
    } catch (e) {
      // Retry once
      try {
        const result = await tryCall();
        clearTimeout(timeout);
        return result;
      } catch (e2) {
        clearTimeout(timeout);
        throw e2;
      }
    }
  },

  heuristicWriting(task1Response, task2Response) {
    // Fallback heuristic: word count proximity, sentence variety, vocab diversity
    function scoreText(text, minW, maxW, maxScore) {
      if (!text || !text.trim()) return { score: 0, criteria: {}, summary: 'No response was submitted for this task. Please complete written tasks fully to receive a meaningful evaluation.' };
      const wc = countWords(text);
      const sentences = text.split(/[.!?]+/).filter(s => s.trim().length > 0);
      const avgSentLen = sentences.length > 0 ? wc / sentences.length : 0;
      const uniqueWords = new Set(text.toLowerCase().match(/\b[a-z]+\b/g) || []);
      const vocabRatio = wc > 0 ? uniqueWords.size / wc : 0;

      // Word count score
      let wcScore;
      if (wc < minW * 0.5) wcScore = 0.3;
      else if (wc < minW) wcScore = 0.55;
      else if (wc <= maxW) wcScore = 1.0;
      else if (wc <= maxW * 1.2) wcScore = 0.85;
      else wcScore = 0.7;

      // Sentence variety (target avg 12-22)
      const sentScore = (avgSentLen >= 10 && avgSentLen <= 24) ? 1.0 : 0.7;
      // Vocab diversity
      const vocabScore = vocabRatio >= 0.55 ? 1.0 : (vocabRatio >= 0.4 ? 0.8 : 0.6);

      // Aggregate
      const overall = wcScore * 0.4 + sentScore * 0.3 + vocabScore * 0.3;
      const finalScore = Math.round(maxScore * overall);

      return {
        score: finalScore,
        wordCount: wc,
        summary: `Heuristic evaluation based on word-count proximity (${wc} words), sentence variety (avg ${avgSentLen.toFixed(1)} words/sentence) and vocabulary diversity (${(vocabRatio*100).toFixed(0)}% unique words). For a precise rubric-based score, this report should be re-run with an Anthropic API key configured.`
      };
    }
    return {
      task1: { ...scoreText(task1Response, 150, 200, 10), criteria: {} },
      task2: { ...scoreText(task2Response, 250, 300, 15), criteria: {} },
      overallStrengths: [],
      overallImprovements: ['Run AI evaluation for detailed rubric feedback.']
    };
  }
};

function renderEvaluating() {

  const stepsEl = el('div', { class: 'eval-steps mt-8' });
  const stepNodes = steps.map((s, i) => {
    const n = el('div', { class: 'eval-step' },
      el('div', { class: 'es-icon' }, String(i + 1)),
      el('div', { class: 'es-label' }, s.label)
    );
    stepsEl.appendChild(n);
    return n;
  });

    el('span', { class: 'eyebrow' }, el('span', { class: 'dot' }), 'Processing'),

    el('p', { class: 'text-muted' }, 'This usually takes 30–60 seconds. Please do not close this window.'),
    stepsEl
  );
  wrap.appendChild(container);
  wrap.appendChild(footer());

  // Advance step indicators on a timer (purely cosmetic — actual scoring runs in completeAssessment)
  let idx = 0;
  function next() {

    if (idx < stepNodes.length) {
      stepNodes[idx].classList.add('active');
      setTimeout(() => { idx++; next(); }, steps[idx].delay);
    }
  }
  setTimeout(next, 100);

  return wrap;
}

/* Build a portable, self-contained results envelope a candidate can email
   back to the recruiter — and an admin can import into their console. */
function buildResultsEnvelope() {
  return {
    schema: 'ceap.results.v1',
    exportedAt: Date.now(),
    candidate: State.candidate,
    session: {
      id: State.session.id,
      startedAt: State.session.startedAt,
      completedSections: State.session.completedSections,
      violations: State.session.violations,
      riskScore: State.session.riskScore,
      behaviour: State.session.behaviour,
      answers: State.session.answers,
      // Also persist the exact questions seen, so an admin can re-evaluate writing with AI
      questions: {
        writingTask1: State.session.questions.writingTask1,
        writingTask2: State.session.questions.writingTask2,
      }
    },
    scores: State.scores
  };
}

function sendResultsToRecruiter() {
  const envelope = buildResultsEnvelope();
  const blob = new Blob([JSON.stringify(envelope, null, 2)], { type: 'application/json' });
  const fileName = `CEAP_Results_${State.candidate.candidateId}.json`;
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = fileName; a.click();
  setTimeout(() => URL.revokeObjectURL(url), 1000);

  // Show a guidance modal
  State.set({ modal: {
    icon: 'check', iconClass: 'info',
    title: 'Results file downloaded',
    body: el('div', {},
      el('p', { class: 'mb-3' }, `A small file (${fileName}) has just been downloaded to this device.`),
      el('p', { class: 'mb-3' }, el('strong', {}, 'Please email this file as an attachment to the recruiter who shared this test link with you.'), ' This is how your scores reach the Channelplay talent team.'),
      el('p', { class: 'mb-0 text-xs text-muted' }, 'For your records, please also download the detailed PDF report using the button on the results page.')
    ),
    actions: [{ label: 'Done', class: 'btn-primary', onClick: () => State.set({ modal: null }) }]
  }});
}

/* Admin-side: pick one or many candidate result JSON files and import them
   into the local admin database. Same envelope shape that sendResultsToRecruiter
   produces. Performs basic validation and dedupes by recordId fingerprint. */
function importCandidateResults() {
  const picker = document.createElement('input');
  picker.type = 'file';
  picker.accept = 'application/json,.json';
  picker.multiple = true;
  picker.style.display = 'none';
  document.body.appendChild(picker);

  picker.addEventListener('change', async () => {
    const files = Array.from(picker.files || []);
    document.body.removeChild(picker);
    if (files.length === 0) return;

    const results = { imported: 0, skipped: 0, failed: [] };
    const existing = AdminDB.getAll();
    const existingFingerprint = new Set(existing.map(r => `${r.candidate.candidateId}::${r.session.id}`));

    for (const file of files) {
      try {
        const text = await file.text();
        const env = JSON.parse(text);
        if (!env || env.schema !== 'ceap.results.v1' || !env.candidate || !env.session || !env.scores) {
          results.failed.push(`${file.name}: not a valid CEAP results file`);
          continue;
        }
        const fp = `${env.candidate.candidateId}::${env.session.id}`;
        if (existingFingerprint.has(fp)) { results.skipped++; continue; }

        // Reconstruct a record shaped exactly like AdminDB.saveCompletedSession would write.
        const record = {
          recordId: 'R-IMP-' + Date.now() + '-' + Math.random().toString(36).slice(2, 6).toUpperCase(),
          savedAt: Date.now(),
          importedAt: Date.now(),
          source: 'imported_from_candidate',
          candidate: env.candidate,
          session: {
            id: env.session.id,
            completedSections: env.session.completedSections || [],
            violations: env.session.violations || [],
            riskScore: env.session.riskScore || 0,
            behaviour: env.session.behaviour || {},
            startedAt: env.session.startedAt,
            // Keep the answers + writing prompts so admin can re-evaluate later
            answers: env.session.answers,
            questions: env.session.questions
          },
          scores: env.scores
        };
        const all = AdminDB.getAll();
        all.unshift(record);
        localStorage.setItem(CONFIG.ADMIN_DB_KEY, JSON.stringify(all.slice(0, 200)));
        existingFingerprint.add(fp);
        results.imported++;
      } catch (e) {
        results.failed.push(`${file.name}: ${e.message}`);
      }
    }

    const body = el('div', {},
      el('p', { class: 'mb-2' }, el('strong', {}, `${results.imported}`), ' candidate result file(s) imported successfully.'),
      results.skipped > 0 ? el('p', { class: 'mb-2 text-sm text-muted' }, `${results.skipped} file(s) skipped — already present.`) : null,
      results.failed.length > 0 ? el('div', { class: 'mb-2' },
        el('p', { class: 'text-sm', style: { color: 'var(--danger)' } }, `${results.failed.length} file(s) failed:`),
        el('ul', { class: 'text-xs', style: { paddingLeft: '18px', color: 'var(--ink-700)' } }, ...results.failed.map(f => el('li', {}, f)))
      ) : null,
      results.imported > 0 ? el('p', { class: 'mb-0 text-sm text-muted mt-2' }, 'Imported candidates appear in the Candidates tab.') : null
    );

    State.set({ modal: {
      icon: results.imported > 0 ? 'check' : 'alert',
      iconClass: results.imported > 0 ? 'info' : 'warn',
      title: results.imported > 0 ? 'Import complete' : 'Nothing imported',
      body,
      actions: [{ label: 'Done', class: 'btn-primary', onClick: () => { State.set({ modal: null }); render(); } }]
    }});
  });

  picker.click();
}

function scoreRing(value, max, ringColor) {
  const size = 180;
  const stroke = 14;
  const r = (size - stroke) / 2;
  const circumference = 2 * Math.PI * r;
  const pct = Math.max(0, Math.min(1, value / max));
  const offset = circumference * (1 - pct);
  const trackColor = ringColor === '#fff' ? 'rgba(255,255,255,0.25)' : 'var(--ink-200)';
  const fillColor = ringColor || 'url(#ringGradient)';
  return el('div', { class: 'score-ring-wrap' },
    el('div', { html: `
      <svg class="score-ring-svg" width="${size}" height="${size}">
        <defs>
          <linearGradient id="ringGradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#4F1B8C"/>
            <stop offset="50%" stop-color="#8B21C9"/>
            <stop offset="100%" stop-color="#C026D3"/>
          </linearGradient>
        </defs>
        <circle cx="${size/2}" cy="${size/2}" r="${r}" stroke="${trackColor}" stroke-width="${stroke}" fill="none"/>
        <circle cx="${size/2}" cy="${size/2}" r="${r}" stroke="${fillColor}" stroke-width="${stroke}" fill="none" stroke-linecap="round" stroke-dasharray="${circumference}" stroke-dashoffset="${offset}"/>
      </svg>
    `}),
    el('div', { class: 'score-ring-center', style: ringColor === '#fff' ? { color: '#fff' } : {} },
      el('div', { class: 'score-ring-num', style: ringColor === '#fff' ? { color: '#fff' } : {} }, String(value)),
      el('div', { class: 'score-ring-denom', style: ringColor === '#fff' ? { color: 'rgba(255,255,255,0.85)' } : {} }, `/ ${max}`)
    )
  );
}
</script>

  weaknessAdvice(label) {
