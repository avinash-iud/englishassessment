<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CEAP — Channelplay English Assessment Platform</title>
<meta name="description" content="Channelplay English Assessment Platform — Phase 1 MVP" />

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Playfair+Display:wght@400;600;700;900&display=swap" rel="stylesheet">

<!-- Libraries -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
:root {
  --cp-purple-900: #2A0851;
  --cp-purple-800: #4F1B8C;
  --cp-purple-700: #6B1FB0;
  --cp-purple-600: #8B21C9;
  --cp-pink-500: #C026D3;
  --cp-pink-400: #D946EF;
  --cp-violet-50: #F5F0FF;
  --cp-violet-100: #EDE3FB;

  --cp-gradient: linear-gradient(135deg, #4F1B8C 0%, #8B21C9 50%, #C026D3 100%);
  --cp-gradient-soft: linear-gradient(135deg, rgba(79,27,140,0.08) 0%, rgba(192,38,211,0.05) 100%);
  --cp-gradient-radial: radial-gradient(ellipse at top, rgba(139,33,201,0.18), transparent 60%);

  --ink-900: #0E0A1A;
  --ink-800: #1F1733;
  --ink-700: #2D2447;
  --ink-600: #4A3F66;
  --ink-500: #6B6188;
  --ink-400: #968CB0;
  --ink-300: #C5BEDA;
  --ink-200: #E5E0F0;
  --ink-100: #F4F1FA;
  --ink-50:  #FAFAFE;

  --success: #16A34A;
  --success-50: #DCFCE7;
  --warning: #D97706;
  --warning-50: #FEF3C7;
  --danger:  #DC2626;
  --danger-50: #FEE2E2;
  --info: #2563EB;
  --info-50: #DBEAFE;

  --shadow-sm: 0 1px 2px 0 rgba(15, 5, 40, 0.04);
  --shadow-md: 0 4px 12px -2px rgba(15, 5, 40, 0.08), 0 2px 4px -2px rgba(15, 5, 40, 0.04);
  --shadow-lg: 0 12px 30px -8px rgba(79, 27, 140, 0.18), 0 4px 12px -2px rgba(15, 5, 40, 0.06);
  --shadow-xl: 0 24px 60px -12px rgba(79, 27, 140, 0.28), 0 8px 24px -4px rgba(15, 5, 40, 0.08);
  --shadow-brand: 0 16px 40px -12px rgba(139, 33, 201, 0.45);

  --r-xs: 6px;
  --r-sm: 10px;
  --r-md: 14px;
  --r-lg: 20px;
  --r-xl: 28px;
  --r-2xl: 36px;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: 'Outfit', system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
  background: var(--ink-50);
  color: var(--ink-900);
  font-size: 15px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  min-height: 100vh;
}

.display { font-family: 'Playfair Display', Georgia, serif; }

button, input, select, textarea { font-family: inherit; font-size: inherit; color: inherit; }
button { cursor: pointer; }

/* ===== App shell ===== */
#app { min-height: 100vh; display: flex; flex-direction: column; }

/* Background canvas */
.bg-canvas {
  position: fixed; inset: 0; z-index: -1; pointer-events: none;
  background:
    radial-gradient(ellipse 800px 500px at 80% -10%, rgba(192,38,211,0.10), transparent 60%),
    radial-gradient(ellipse 700px 500px at 0% 30%, rgba(79,27,140,0.10), transparent 60%),
    var(--ink-50);
}

/* ===== Brand mark ===== */
.brand-mark { display: inline-flex; align-items: center; gap: 12px; }
.brand-logo {
  width: 40px; height: 40px;
  border-radius: 10px;
  background: var(--cp-gradient);
  display: grid; place-items: center;
  color: #fff; font-weight: 800; font-size: 18px;
  box-shadow: var(--shadow-brand);
  position: relative;
  overflow: hidden;
}
.brand-logo::after {
  content: ''; position: absolute; inset: 1px;
  border-radius: 9px;
  background: linear-gradient(135deg, transparent 30%, rgba(255,255,255,0.18) 50%, transparent 70%);
}
.brand-logo span { position: relative; z-index: 1; letter-spacing: -0.02em; }
.brand-name { display: flex; flex-direction: column; line-height: 1.1; }
.brand-name .top { font-weight: 700; font-size: 15px; color: var(--ink-900); letter-spacing: -0.01em; }
.brand-name .bot { font-size: 11px; color: var(--ink-500); letter-spacing: 0.04em; text-transform: uppercase; font-weight: 500; }

/* ===== Header ===== */
.app-header {
  background: rgba(255,255,255,0.85);
  backdrop-filter: saturate(180%) blur(16px);
  -webkit-backdrop-filter: saturate(180%) blur(16px);
  border-bottom: 1px solid var(--ink-200);
  padding: 14px 32px;
  position: sticky; top: 0; z-index: 50;
  display: flex; align-items: center; justify-content: space-between;
}
.app-header .right { display: flex; align-items: center; gap: 12px; color: var(--ink-500); font-size: 13px; }

/* ===== Layout containers ===== */
.container { max-width: 1200px; margin: 0 auto; padding: 0 32px; }
.container-narrow { max-width: 820px; margin: 0 auto; padding: 0 24px; }
.container-wide { max-width: 1400px; margin: 0 auto; padding: 0 32px; }

/* ===== Buttons ===== */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  padding: 12px 22px; border-radius: var(--r-md);
  font-weight: 600; font-size: 14.5px; letter-spacing: -0.005em;
  border: 1px solid transparent;
  transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.2s ease;
  user-select: none; white-space: nowrap;
}
.btn:disabled { opacity: 0.45; cursor: not-allowed; }
.btn:not(:disabled):active { transform: translateY(1px); }

.btn-primary {
  background: var(--cp-gradient);
  color: #fff;
  box-shadow: var(--shadow-brand);
}
.btn-primary:not(:disabled):hover { box-shadow: 0 20px 50px -10px rgba(139,33,201,0.55); }

.btn-secondary {
  background: #fff;
  color: var(--ink-900);
  border-color: var(--ink-200);
  box-shadow: var(--shadow-sm);
}
.btn-secondary:not(:disabled):hover { border-color: var(--cp-purple-700); color: var(--cp-purple-800); }

.btn-ghost { background: transparent; color: var(--ink-700); }
.btn-ghost:not(:disabled):hover { background: var(--ink-100); }

.btn-danger { background: var(--danger); color: #fff; }
.btn-danger:not(:disabled):hover { background: #B91C1C; }

.btn-sm { padding: 8px 14px; font-size: 13px; border-radius: var(--r-sm); }
.btn-lg { padding: 16px 28px; font-size: 16px; border-radius: var(--r-lg); }

/* ===== Cards ===== */
.card {
  background: #fff;
  border: 1px solid var(--ink-200);
  border-radius: var(--r-lg);
  box-shadow: var(--shadow-md);
}
.card-pad { padding: 28px; }
.card-pad-lg { padding: 36px; }

.card-glow {
  position: relative;
  background: #fff;
  border-radius: var(--r-xl);
  box-shadow: var(--shadow-xl);
  border: 1px solid var(--ink-200);
}
.card-glow::before {
  content: ''; position: absolute; inset: -1px;
  border-radius: inherit;
  background: var(--cp-gradient);
  z-index: -1;
  opacity: 0.06;
  filter: blur(20px);
}

/* ===== Form elements ===== */
.field { display: flex; flex-direction: column; gap: 6px; }
.field-label {
  font-size: 13px; font-weight: 600; color: var(--ink-700);
  display: flex; justify-content: space-between; align-items: center;
}
.field-label .req { color: var(--cp-pink-500); margin-left: 2px; }
.field-hint { font-size: 12px; color: var(--ink-500); }
.field-error { font-size: 12px; color: var(--danger); margin-top: 2px; min-height: 16px; }

.input, .select, .textarea {
  width: 100%;
  padding: 11px 14px;
  border: 1.5px solid var(--ink-200);
  border-radius: var(--r-md);
  background: #fff;
  color: var(--ink-900);
  font-size: 14.5px;
  transition: border-color 0.15s, box-shadow 0.15s, background 0.15s;
}
.input:focus, .select:focus, .textarea:focus {
  outline: none;
  border-color: var(--cp-purple-700);
  box-shadow: 0 0 0 4px rgba(139,33,201,0.10);
}
.input.invalid, .select.invalid, .textarea.invalid {
  border-color: var(--danger);
  box-shadow: 0 0 0 4px rgba(220,38,38,0.08);
}
.textarea { resize: vertical; min-height: 140px; line-height: 1.6; }

.chip-group { display: flex; flex-wrap: wrap; gap: 8px; }
.chip {
  padding: 9px 16px;
  border: 1.5px solid var(--ink-200);
  border-radius: 999px;
  background: #fff;
  font-size: 13.5px; font-weight: 500;
  color: var(--ink-700);
  transition: all 0.15s;
  user-select: none;
}
.chip:hover { border-color: var(--cp-purple-700); color: var(--cp-purple-800); }
.chip.active {
  background: var(--cp-gradient);
  color: #fff;
  border-color: transparent;
  box-shadow: 0 4px 12px -2px rgba(139,33,201,0.35);
}

.checkbox-row { display: flex; align-items: flex-start; gap: 12px; padding: 14px; background: var(--ink-50); border-radius: var(--r-md); border: 1px solid var(--ink-200); }
.checkbox-row input[type=checkbox] { width: 18px; height: 18px; margin-top: 2px; accent-color: var(--cp-purple-700); }
.checkbox-row label { font-size: 14px; color: var(--ink-700); line-height: 1.5; }

/* ===== Grid ===== */
.grid { display: grid; gap: 16px; }
.grid-2 { grid-template-columns: 1fr 1fr; }
.grid-3 { grid-template-columns: repeat(3, 1fr); }
.grid-4 { grid-template-columns: repeat(4, 1fr); }
@media (max-width: 720px) {
  .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; }
}

/* ===== Badges ===== */
.badge {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 4px 10px;
  border-radius: 999px;
  font-size: 11.5px; font-weight: 600;
  letter-spacing: 0.02em;
}
.badge-purple { background: var(--cp-violet-100); color: var(--cp-purple-800); }
.badge-success { background: var(--success-50); color: var(--success); }
.badge-warning { background: var(--warning-50); color: var(--warning); }
.badge-danger  { background: var(--danger-50);  color: var(--danger); }
.badge-info    { background: var(--info-50);    color: var(--info); }
.badge-neutral { background: var(--ink-100); color: var(--ink-600); }

/* ===== Section eyebrow ===== */
.eyebrow {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 6px 14px;
  background: var(--cp-violet-100);
  color: var(--cp-purple-800);
  border-radius: 999px;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}
.eyebrow .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--cp-pink-500); }

/* ===== Test interface ===== */
.test-topbar {
  background: #fff;
  border-bottom: 1px solid var(--ink-200);
  padding: 12px 24px;
  position: sticky; top: 0; z-index: 40;
  display: flex; align-items: center; justify-content: space-between;
  gap: 16px; flex-wrap: wrap;
  box-shadow: var(--shadow-sm);
}
.topbar-left { display: flex; align-items: center; gap: 16px; }
.section-pill {
  padding: 6px 14px;
  background: var(--cp-gradient);
  color: #fff;
  border-radius: 999px;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: -0.005em;
  white-space: nowrap;
}
.topbar-stat {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 12px;
  background: var(--ink-100);
  border-radius: var(--r-sm);
  font-size: 13px; font-weight: 500; color: var(--ink-700);
}
.topbar-stat.danger { background: var(--danger-50); color: var(--danger); }
.topbar-stat.warn { background: var(--warning-50); color: var(--warning); }
.timer-display {
  font-variant-numeric: tabular-nums;
  font-weight: 700;
  font-size: 16px;
  letter-spacing: 0.02em;
}
.timer-display.warn { color: var(--warning); }
.timer-display.danger { color: var(--danger); animation: pulse 1s infinite; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.55; } }

/* ===== Question card ===== */
.question-card {
  background: #fff;
  border: 1px solid var(--ink-200);
  border-radius: var(--r-lg);
  padding: 24px 26px;
  margin-bottom: 16px;
  transition: border-color 0.15s, box-shadow 0.15s;
}
.question-card.answered { border-color: var(--cp-purple-700); box-shadow: 0 0 0 4px rgba(139,33,201,0.05); }
.q-number {
  display: inline-flex; align-items: center; justify-content: center;
  width: 30px; height: 30px;
  background: var(--cp-gradient);
  color: #fff;
  border-radius: 8px;
  font-size: 13px; font-weight: 700;
  margin-right: 12px;
  flex-shrink: 0;
}
.q-stem { font-size: 15.5px; line-height: 1.6; color: var(--ink-900); margin-bottom: 16px; }
.q-stem .underline-word { text-decoration: underline; text-decoration-color: var(--cp-pink-500); text-decoration-thickness: 2px; font-weight: 600; }

.option-list { display: flex; flex-direction: column; gap: 10px; }
.option {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 12px 16px;
  border: 1.5px solid var(--ink-200);
  border-radius: var(--r-md);
  background: #fff;
  cursor: pointer;
  transition: all 0.12s;
  user-select: none;
}
.option:hover { border-color: var(--cp-purple-700); background: var(--cp-violet-50); }
.option.selected {
  border-color: var(--cp-purple-700);
  background: linear-gradient(135deg, rgba(79,27,140,0.05), rgba(192,38,211,0.05));
  box-shadow: 0 0 0 3px rgba(139,33,201,0.08);
}
.option-bullet {
  width: 24px; height: 24px;
  border: 2px solid var(--ink-300);
  border-radius: 50%;
  display: grid; place-items: center;
  font-size: 12px; font-weight: 700; color: var(--ink-500);
  flex-shrink: 0;
  transition: all 0.12s;
}
.option.selected .option-bullet {
  background: var(--cp-gradient);
  border-color: transparent;
  color: #fff;
}
.option-text { flex: 1; font-size: 14.5px; line-height: 1.55; color: var(--ink-800); }

/* Error correction - clickable words */
.ec-sentence { font-size: 16px; line-height: 1.9; color: var(--ink-900); }
.ec-word {
  display: inline-block;
  padding: 2px 5px;
  margin: 0 1px;
  border-radius: 5px;
  cursor: pointer;
  transition: all 0.12s;
}
.ec-word:hover { background: var(--cp-violet-100); }
.ec-word.selected {
  background: var(--cp-gradient);
  color: #fff;
  font-weight: 600;
}

/* Reading split view */
.reading-split { display: grid; grid-template-columns: 1.1fr 1fr; gap: 24px; }
@media (max-width: 980px) { .reading-split { grid-template-columns: 1fr; } }
.passage-pane {
  background: #fff;
  border: 1px solid var(--ink-200);
  border-radius: var(--r-lg);
  padding: 24px;
  max-height: 70vh; overflow-y: auto;
  position: sticky; top: 80px;
}
.passage-pane h3 { font-family: 'Playfair Display', serif; margin: 0 0 12px 0; font-size: 22px; color: var(--ink-900); }
.passage-pane p { line-height: 1.75; color: var(--ink-800); font-size: 15px; }

.passage-tabs { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
.passage-tab {
  padding: 8px 14px;
  background: #fff;
  border: 1.5px solid var(--ink-200);
  border-radius: var(--r-sm);
  font-size: 13px; font-weight: 500; color: var(--ink-700);
  transition: all 0.12s;
}
.passage-tab.active {
  background: var(--cp-gradient);
  color: #fff;
  border-color: transparent;
}
.passage-tab .difficulty-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 6px; }
.passage-tab .difficulty-dot.easy { background: var(--success); }
.passage-tab .difficulty-dot.med { background: var(--warning); }
.passage-tab .difficulty-dot.hard { background: var(--danger); }

/* Writing textarea */
.writing-card { background: #fff; border: 1px solid var(--ink-200); border-radius: var(--r-lg); padding: 24px; margin-bottom: 16px; }
.writing-prompt {
  padding: 16px 20px;
  background: linear-gradient(135deg, rgba(79,27,140,0.05), rgba(192,38,211,0.04));
  border-left: 3px solid var(--cp-pink-500);
  border-radius: 0 var(--r-md) var(--r-md) 0;
  margin-bottom: 16px;
  font-size: 15px; line-height: 1.65; color: var(--ink-800);
}
.writing-textarea {
  width: 100%;
  min-height: 280px;
  padding: 16px;
  border: 1.5px solid var(--ink-200);
  border-radius: var(--r-md);
  font-family: inherit;
  font-size: 15px; line-height: 1.7;
  resize: vertical;
}
.writing-textarea:focus { outline: none; border-color: var(--cp-purple-700); box-shadow: 0 0 0 4px rgba(139,33,201,0.10); }

.word-count-badge {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 14px;
  border-radius: 999px;
  font-size: 12.5px; font-weight: 600;
  margin-top: 10px;
}
.word-count-badge.below { background: var(--ink-100); color: var(--ink-600); }
.word-count-badge.ok { background: var(--success-50); color: var(--success); }
.word-count-badge.over { background: var(--danger-50); color: var(--danger); }

/* Sentence ordering */
.so-list { display: flex; flex-direction: column; gap: 8px; }
.so-item {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 14px;
  background: #fff;
  border: 1.5px solid var(--ink-200);
  border-radius: var(--r-md);
  cursor: grab;
  transition: all 0.15s;
}
.so-item:hover { border-color: var(--cp-purple-700); }
.so-item.dragging { opacity: 0.4; }
.so-item .so-handle {
  width: 30px; height: 30px;
  background: var(--ink-100);
  border-radius: 8px;
  display: grid; place-items: center;
  color: var(--ink-500);
  flex-shrink: 0;
}
.so-item .so-text { flex: 1; font-size: 14.5px; line-height: 1.55; color: var(--ink-800); }
.so-item .so-pos {
  width: 30px; height: 30px;
  background: var(--cp-gradient);
  color: #fff;
  border-radius: 50%;
  display: grid; place-items: center;
  font-size: 12px; font-weight: 700;
  flex-shrink: 0;
}

/* ===== Score ring ===== */
.score-ring-wrap { position: relative; display: inline-block; }
.score-ring-svg { transform: rotate(-90deg); }
.score-ring-center {
  position: absolute; inset: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
}
.score-ring-num { font-family: 'Playfair Display', serif; font-size: 56px; font-weight: 700; line-height: 1; color: var(--ink-900); }
.score-ring-denom { font-size: 14px; color: var(--ink-500); margin-top: 4px; }

/* ===== Modal ===== */
.modal-backdrop {
  position: fixed; inset: 0; z-index: 100;
  background: rgba(15, 5, 40, 0.55);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  display: grid; place-items: center;
  padding: 20px;
}
.modal {
  background: #fff;
  border-radius: var(--r-xl);
  max-width: 480px; width: 100%;
  padding: 32px;
  box-shadow: var(--shadow-xl);
}
.modal-icon {
  width: 56px; height: 56px;
  border-radius: 16px;
  display: grid; place-items: center;
  margin-bottom: 16px;
  font-size: 24px;
}
.modal-icon.warn { background: var(--warning-50); color: var(--warning); }
.modal-icon.danger { background: var(--danger-50); color: var(--danger); }
.modal-icon.info { background: var(--info-50); color: var(--info); }
.modal h3 { font-family: 'Playfair Display', serif; font-size: 24px; margin: 0 0 8px 0; color: var(--ink-900); }
.modal p { color: var(--ink-600); margin: 0 0 20px 0; line-height: 1.6; }

/* ===== Loading ===== */
.spinner {
  width: 32px; height: 32px;
  border: 3px solid var(--ink-200);
  border-top-color: var(--cp-purple-700);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.eval-steps { display: flex; flex-direction: column; gap: 14px; max-width: 460px; margin: 0 auto; }
.eval-step {
  display: flex; align-items: center; gap: 14px;
  padding: 16px 18px;
  background: #fff;
  border: 1px solid var(--ink-200);
  border-radius: var(--r-md);
  transition: all 0.3s;
}
.eval-step .es-icon {
  width: 32px; height: 32px;
  border-radius: 50%;
  background: var(--ink-100);
  display: grid; place-items: center;
  color: var(--ink-500);
  font-weight: 700; font-size: 13px;
  flex-shrink: 0;
}
.eval-step.active { border-color: var(--cp-purple-700); box-shadow: 0 0 0 4px rgba(139,33,201,0.08); }
.eval-step.active .es-icon { background: var(--cp-gradient); color: #fff; }
.eval-step.done .es-icon { background: var(--success); color: #fff; }
.eval-step .es-label { font-weight: 500; color: var(--ink-800); }

/* ===== Results screen ===== */
.result-hero {
  background: var(--cp-gradient);
  border-radius: var(--r-2xl);
  padding: 40px;
  color: #fff;
  position: relative;
  overflow: hidden;
}
.result-hero::before {

      topic: 'Technology',
      difficulty: 'M',
      passage: `For nearly two decades, the cloud computing narrative has been one of consolidation: workloads moving away from dispersed on-premises servers into massive, centrally managed data centres operated by a handful of hyperscalers. Yet a counter-current is now reshaping the architecture of modern systems. Edge computing — the practice of running compute and storage close to where data is generated — has moved from a niche concern of telecom operators to a mainstream consideration for any organisation building latency-sensitive or bandwidth-heavy applications.

The drivers are practical rather than ideological. Autonomous vehicles cannot tolerate the round-trip latency of a centralised cloud. Industrial sites with intermittent connectivity need local inference. Privacy regulations increasingly favour data processing close to its source. And, crucially, the economics have shifted: GPUs and specialised inference chips have become small and cheap enough to deploy in cell towers, factory floors, and retail outlets.

This does not mean the cloud is in retreat. Instead, the architecture has become hierarchical. The hyperscaler trains the model, the regional cloud hosts the orchestration layer, and the edge node executes the inference. The challenge for engineering teams is no longer where to put a workload, but how to design systems that fluidly span all three tiers — a problem that the prevailing developer tooling is still catching up to.`,

      topic: 'Society/Environment',
      difficulty: 'H',
      passage: `Urban heat is no longer a seasonal inconvenience; in many metropolitan regions it has become a structural public-health issue with measurable mortality consequences. The phenomenon is well understood at a high level: dense concentrations of dark surfaces, sparse vegetation, and waste heat from vehicles and buildings combine to push city temperatures several degrees above their rural surroundings. What is less appreciated is how unevenly the burden is distributed within a city.

Studies in cities as varied as Delhi, Houston and Athens have consistently found that lower-income neighbourhoods experience surface temperatures several degrees higher than affluent ones in the same urban core. The reasons are layered. Such neighbourhoods tend to have less tree canopy, more impervious paving, narrower roads with poor air circulation, and a higher density of small-scale industrial activity. Cooling, when available at all, is more often refrigerant-based room units that vent heat back into already-hot streets, compounding the very problem they were installed to escape.

      difficulty: 'H',
      passage: `It is fashionable to assert that long-form reading is dying, undone by the swipe and the scroll. The data, however, is more interesting than the headline. Across most developed economies, the absolute volume of words read per person per day has not fallen — in fact, it has risen sharply. What has collapsed is the duration of any single reading session. The average uninterrupted reading episode for an adult in 2024 was under nine minutes, down from over twenty-six minutes in 2004.

This matters because cognitive scientists draw a distinction between superficial reading and what they call 'deep reading' — the mode in which the reader holds a complex argument in working memory long enough to interrogate it, draw inferences, and connect it to prior knowledge. Deep reading appears to require not merely time, but unfragmented time. Studies using eye-tracking show that comprehension of complex argumentative text degrades sharply once interruptions exceed a certain threshold, even when total reading time is held constant.

The drivers are several. Acute shortages in technical fields have forced employers to look beyond the conventional graduate funnel. Online learning platforms have made it possible to acquire specific job-relevant skills outside formal education. Most importantly, the tools for evaluating skills directly — structured assessments, portfolio reviews, work samples and now AI-assisted evaluation — have become reliable enough that they can credibly replace the credential as a primary filter rather than serving as a confirmatory step.

<script>
/* ====================================================================
   ACCESS MODE — controls whether the Admin Console is reachable.
   Candidates open the test via a shared link with ?candidate=1.
   Admins open the bare URL (or with ?admin=1) on the hosted/admin
   environment to see the Admin Console.
   ==================================================================== */
const URL_PARAMS = new URLSearchParams(window.location.search);
const IS_CANDIDATE_MODE = URL_PARAMS.get('candidate') === '1';

/* ====================================================================
   APPLICATION CONFIG
   ==================================================================== */
const CONFIG = {
  APP_NAME: 'CEAP',
  ORG_NAME: 'Channelplay',
  PRODUCT_LINE: '1ChannelTech',
  VERSION: '1.0.0',
  STORAGE_KEY: 'ceap_session_v1',
  ADMIN_DB_KEY: 'ceap_admin_db_v1',
  AI_MODEL: 'claude-sonnet-4-20250514',
  TIMERS: { // seconds
    GRAMMAR: 20 * 60,
    READING: 12 * 60,
    WRITING: 15 * 60,
    LOGICAL: 8 * 60,
  },
  ANTICHEAT: {
    INACTIVITY_THRESHOLD: 90,          // seconds
    INACTIVITY_COUNTDOWN: 30,          // seconds
    AUTO_SUBMIT_VIOLATION_THRESHOLD: 4 // combined tab/blur/fullscreen events
  },
  PROFICIENCY_LEVELS: [
    { min: 0,  max: 29,  level: 'Beginner',     indicator: 'Not Recommended',         action: 'Decline or assign intensive English training',          color: '#DC2626' },
    { min: 30, max: 44,  level: 'Elementary',   indicator: 'Requires Development',    action: 'Entry-level roles only; structured upskilling required', color: '#EA580C' },
    { min: 45, max: 59,  level: 'Intermediate', indicator: 'Conditionally Suitable',  action: 'Roles with limited English exposure; coaching advised',  color: '#D97706' },
    { min: 60, max: 74,  level: 'Advanced',     indicator: 'Recommended',             action: 'Suitable for most professional and client-facing roles', color: '#16A34A' },
    { min: 75, max: 100, level: 'Expert',       indicator: 'Highly Recommended',      action: 'Leadership, training, and communication-intensive roles', color: '#059669' },
  ],
  RISK_LEVELS: [
    { min: 0,  max: 10, level: 'Minimal',  badge: 'Green — Clean Session',     color: '#16A34A' },
    { min: 11, max: 30, level: 'Low',      badge: 'Green — Minor Anomaly',     color: '#16A34A' },
    { min: 31, max: 55, level: 'Medium',   badge: 'Amber — Review Advised',    color: '#D97706' },
    { min: 56, max: 79, level: 'High',     badge: 'Red — Integrity Concern',   color: '#DC2626' },
    { min: 80, max: 100,level: 'Critical', badge: 'Red — Result Flagged',      color: '#991B1B' },
  ]
};

/* ====================================================================
   STATE
   ==================================================================== */
const State = {
  mode: 'admin',          // 'admin' | 'candidate' — set in bootstrap based on URL
  screen: 'landing',
  candidate: null,
  apiKey: '',             // Admin-configured key (in admin mode); never collected from candidates
  session: null,
  scores: null,
  modal: null,
  reading: { activePassageIdx: 0 },
  testQuestionIdx: 0,     // Currently-displayed question within the active section

  set(patch) { Object.assign(this, patch); render(); },

  createSession(candidate) {
    const now = Date.now();
    const sessionId = 'S-' + Math.random().toString(36).slice(2, 10).toUpperCase();

    // Pick & shuffle questions for this session
    const grammar20 = shuffle(QUESTION_BANK.grammar).slice(0, 20);
    const vocab10   = shuffle(QUESTION_BANK.vocabulary).slice(0, 10);
    const ec5       = shuffle(QUESTION_BANK.errorCorrection).slice(0, 5);
    const readings3 = shuffle(QUESTION_BANK.readingPassages).slice(0, 3);
    const w1        = pick(QUESTION_BANK.writingTask1);
    const w2        = pick(QUESTION_BANK.writingTask2);
    const so5       = shuffle(QUESTION_BANK.sentenceOrdering).slice(0, 5);
    const pc5       = shuffle(QUESTION_BANK.paraCompletion).slice(0, 5);

    // Shuffle MCQ options & remap correct index
    function shuffleOptions(q) {
      const original = q.options.map((opt, idx) => ({ opt, isCorrect: idx === q.correct }));
      const shuffled = shuffle(original);
      return { ...q, options: shuffled.map(o => o.opt), correct: shuffled.findIndex(o => o.isCorrect) };
    }
    const grammar20s = grammar20.map(shuffleOptions);
    const vocab10s   = vocab10.map(shuffleOptions);

    // Shuffle reading question options too
    const readings3s = readings3.map(p => ({
      ...p,
      questions: p.questions.map(shuffleOptions)
    }));
    const pc5s = pc5.map(shuffleOptions);

    // For sentence ordering: shuffle the display order & store correct order
    const so5s = so5.map(q => {
      const indexed = q.sentences.map((s, i) => ({ s, originalIdx: i }));
      const shuffled = shuffle(indexed);
      return {
        ...q,
        displaySentences: shuffled.map(o => o.s),
        // correct order in display indices
        correctDisplayOrder: q.sentences.map(orig => shuffled.findIndex(x => x.s === orig))
      };
    });

    return {
      id: sessionId,
      candidateId: candidate.candidateId,
      startedAt: now,
      currentSection: 0,        // 0..3
      sectionStartedAt: null,
      timeLeft: null,           // current section
      completedSections: [],
      answers: {
        grammar: {},     // qId -> selected option index
        vocabulary: {},
        errorCorrection: {}, // qId -> word index clicked
        reading: {},     // pId -> { qId -> optIdx }
        writingTask1: '',
        writingTask2: '',
        sentenceOrdering: {}, // qId -> array of display indices in chosen order
        paraCompletion: {}
      },
      questions: {
        grammar: grammar20s,
        vocabulary: vocab10s,
        errorCorrection: ec5,
        reading: readings3s,
        writingTask1: w1,
        writingTask2: w2,
        sentenceOrdering: so5s,
        paraCompletion: pc5s
      },
      violations: [],
      riskScore: 0,
      categoryRisk: { tabBlur: 0, fullscreen: 0, devtools: 0, inactivity: 0, copy: 0, paste: 0 },
      webcamGranted: false,
      autoSubmitCount: 0, // combined tab+blur+fullscreen
      behaviour: { revisits: 0, lastAnswerAt: null, perSectionDuration: {} }
    };
  },

  save() {
    try {
      const payload = {
        candidate: this.candidate,
        session: this.session,
        scores: this.scores,
        apiKey: this.apiKey,
        screen: this.screen
      };
      localStorage.setItem(CONFIG.STORAGE_KEY, JSON.stringify(payload));
    } catch (e) { console.warn('Session save failed:', e); }
  },

  restore() {
    try {
      const raw = localStorage.getItem(CONFIG.STORAGE_KEY);
      if (!raw) return false;
      const payload = JSON.parse(raw);
      if (payload.candidate) this.candidate = payload.candidate;
      if (payload.session) this.session = payload.session;
      if (payload.scores) this.scores = payload.scores;
      if (payload.apiKey) this.apiKey = payload.apiKey;
      if (payload.screen) this.screen = payload.screen;
      return true;
    } catch (e) { return false; }
  },

  clear() {
    localStorage.removeItem(CONFIG.STORAGE_KEY);
    this.candidate = null; this.session = null; this.scores = null;
    this.apiKey = ''; this.screen = 'landing';
  }
};

/* ====================================================================
   UTILITIES
   ==================================================================== */
function $(sel, root = document) { return root.querySelector(sel); }
function $$(sel, root = document) { return Array.from(root.querySelectorAll(sel)); }
function el(tag, attrs = {}, ...children) {
  const node = document.createElement(tag);
  for (const k in attrs) {
    if (k === 'class') node.className = attrs[k];
    else if (k === 'style' && typeof attrs[k] === 'object') Object.assign(node.style, attrs[k]);
    else if (k.startsWith('on') && typeof attrs[k] === 'function') node.addEventListener(k.slice(2).toLowerCase(), attrs[k]);
    else if (k === 'html') node.innerHTML = attrs[k];
    else if (typeof attrs[k] === 'boolean') {
      // Boolean attributes (disabled, checked, selected, readonly, etc.): presence = true, absence = false.
      if (attrs[k]) node.setAttribute(k, '');
      if (k in node) node[k] = attrs[k];
    }
    else if (attrs[k] !== null && attrs[k] !== undefined) node.setAttribute(k, attrs[k]);
  }
  for (const child of children) {
    if (child === null || child === undefined || child === false) continue;
    if (Array.isArray(child)) child.forEach(c => node.appendChild(c instanceof Node ? c : document.createTextNode(String(c))));
    else node.appendChild(child instanceof Node ? child : document.createTextNode(String(child)));
  }
  return node;
}
function shuffle(arr) {
  // Fisher-Yates
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function fmtTime(sec) {
  if (sec === null || sec === undefined) return '—';
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}
function fmtDate(ts) {
  const d = new Date(ts);
  return d.toLocaleString('en-IN', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });
}
function generateCandidateId() {
  const d = new Date();
  const ymd = `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
  const chars = 'ABCDEFGHIJKLMNPQRSTUVWXYZ23456789';
  let suffix = '';
  for (let i = 0; i < 6; i++) suffix += chars[Math.floor(Math.random() * chars.length)];
  return `CP-${ymd}-${suffix}`;
}
function countWords(text) {
  return (text || '').trim().split(/\s+/).filter(Boolean).length;
}
function escapeHtml(s) {
  return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function brandMark() {
  return el('div', { class: 'brand-mark' },
    el('div', { class: 'brand-logo' }, el('span', {}, '1C')),
    el('div', { class: 'brand-name' },
      el('span', { class: 'top' }, '1ChannelTech'),
      el('span', { class: 'bot' }, 'CEAP — Assessment Platform')
    )
  );
}

function icon(name, size = 16) {
  // Minimal inline SVG icons
  const paths = {
    clock: '<circle cx="12" cy="12" r="9"/><polyline points="12,7 12,12 15,14"/>',
    shield: '<path d="M12 2 4 6v6c0 5 3.5 9 8 10 4.5-1 8-5 8-10V6z"/>',

    x: '<line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/>',
    eye: '<path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12z"/><circle cx="12" cy="12" r="3"/>',
    alert: '<path d="M12 2L2 22h20L12 2z"/><line x1="12" y1="10" x2="12" y2="14"/><circle cx="12" cy="17" r="1"/>',
    download: '<path d="M12 3v12"/><polyline points="7,10 12,15 17,10"/><line x1="3" y1="20" x2="21" y2="20"/>',
    sparkle: '<path d="M12 2 14 9 21 11 14 13 12 20 10 13 3 11 10 9z"/>',
    arrow: '<line x1="5" y1="12" x2="19" y2="12"/><polyline points="13,6 19,12 13,18"/>',
    edit:  '<path d="M14 4l6 6-12 12H2v-6z"/>',
    user:  '<circle cx="12" cy="8" r="4"/><path d="M4 22c0-4 4-7 8-7s8 3 8 7"/>',
    fullscreen: '<polyline points="4,9 4,4 9,4"/><polyline points="20,9 20,4 15,4"/><polyline points="4,15 4,20 9,20"/><polyline points="20,15 20,20 15,20"/>',
    camera: '<rect x="3" y="7" width="18" height="13" rx="2"/><circle cx="12" cy="13" r="4"/><path d="M9 7l1.5-3h3L15 7"/>',
    chart: '<line x1="3" y1="20" x2="21" y2="20"/><rect x="6" y="11" width="3" height="9"/><rect x="11" y="6" width="3" height="14"/><rect x="16" y="14" width="3" height="6"/>',
    refresh: '<polyline points="21,4 21,10 15,10"/><path d="M3.5 13a9 9 0 0 0 15.4 4.4L21 14"/><polyline points="3,20 3,14 9,14"/><path d="M20.5 11A9 9 0 0 0 5.1 6.6L3 9"/>',
  };
  return `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="join">${paths[name]||''}</svg>`;
}

/* ====================================================================
   ROUTER / RENDER
   ==================================================================== */
function render() {
  // Defence-in-depth: never render the admin screen in candidate mode.
  if (IS_CANDIDATE_MODE && State.screen === 'admin') State.screen = 'landing';

  const app = $('#app');
  app.innerHTML = '';

  switch (State.screen) {
    case 'landing':       app.appendChild(renderLanding()); break;
    case 'registration':  app.appendChild(renderRegistration()); break;
    case 'instructions':  app.appendChild(renderInstructions()); break;
    case 'test':          app.appendChild(renderTest()); break;
    case 'evaluating':    app.appendChild(renderEvaluating()); break;
    case 'results':       app.appendChild(renderResults()); break;
    case 'admin':         app.appendChild(renderAdmin()); break;
    default: app.appendChild(renderLanding());
  }

  renderModal();
  State.save();
}

function renderModal() {
  let root = $('#modal-root');
  root.innerHTML = '';
  if (!State.modal) return;
  const m = State.modal;
  const backdrop = el('div', { class: 'modal-backdrop', onclick: (e) => { if (e.target === backdrop && m.dismissable) State.set({ modal: null }); } });
  const card = el('div', { class: 'modal' });
  if (m.icon) {
    card.appendChild(el('div', { class: `modal-icon ${m.iconClass || 'info'}`, html: icon(m.icon, 24) }));
  }
  if (m.title) card.appendChild(el('h3', {}, m.title));
  if (m.body) {
    const body = typeof m.body === 'string'
      ? el('p', {}, m.body)
      : m.body;
    card.appendChild(body);
  }
  if (m.actions && m.actions.length) {
    const actionsWrap = el('div', { class: 'flex gap-3 mt-2' });
    m.actions.forEach(a => {
      actionsWrap.appendChild(el('button', { class: `btn ${a.class || 'btn-primary'}`, onclick: a.onClick }, a.label));
    });
    card.appendChild(actionsWrap);
  }
  backdrop.appendChild(card);
  root.appendChild(backdrop);
}

function appHeader(extra) {
  return el('header', { class: 'app-header' },
    brandMark(),
    el('div', { class: 'right' },
      // Admin Console is only visible on the admin/host URL, not on the shared candidate link.
      IS_CANDIDATE_MODE ? null : el('button', {
        class: 'btn btn-ghost btn-sm',
        onclick: () => State.set({ screen: 'admin' })
      }, 'Admin Console'),
      extra || null
    )
  );
}
